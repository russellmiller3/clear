<!DOCTYPE html>
<html lang="en" data-theme="ivory">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - GAN Target</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="min-h-screen bg-base-100">
  <main id="app" class="">
    <div style="display:flex; height:100vh; overflow:hidden;">
      <!-- Sidebar -->
      <aside style="width:240px; flex-shrink:0; background:oklch(0.97 0 0); border-right:1px solid oklch(0.9 0 0); padding:1.5rem; display:flex; flex-direction:column; gap:0.25rem;">
        <h2 class="text-lg font-bold mb-4">BookIt</h2>
        <a class="block px-3 py-2 rounded-lg text-sm font-medium bg-primary text-primary-content">Calendar</a>
        <a class="block px-3 py-2 rounded-lg text-sm text-base-content/70 hover:bg-base-200">Services</a>
        <a class="block px-3 py-2 rounded-lg text-sm text-base-content/70 hover:bg-base-200">Clients</a>
        <a class="block px-3 py-2 rounded-lg text-sm text-base-content/70 hover:bg-base-200">Settings</a>
      </aside>
      <!-- Main -->
      <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <header style="padding:1rem 1.5rem; border-bottom:1px solid oklch(0.9 0 0); display:flex; align-items:center; justify-content:space-between;">
          <h1 class="text-xl font-semibold">Upcoming Bookings</h1>
          <button class="btn btn-primary btn-sm">New Booking</button>
        </header>
        <div style="flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem;">
          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4">
            <div class="card bordered p-4"><div class="text-sm opacity-60">Today</div><div class="text-2xl font-bold">5</div></div>
            <div class="card bordered p-4"><div class="text-sm opacity-60">This Week</div><div class="text-2xl font-bold">23</div></div>
            <div class="card bordered p-4"><div class="text-sm opacity-60">Revenue</div><div class="text-2xl font-bold">$1,840</div></div>
          </div>
          <!-- Bookings Table -->
          <div class="card bordered p-4">
            <table class="table table-sm">
              <thead><tr><th>Client</th><th>Service</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
              <tbody>
                <tr><td>Sarah Johnson</td><td>Consultation</td><td>Apr 8</td><td>10:00 AM</td><td><span class="badge badge-info badge-sm">Confirmed</span></td></tr>
                <tr><td>Mike Peters</td><td>Follow-up</td><td>Apr 8</td><td>2:00 PM</td><td><span class="badge badge-warning badge-sm">Pending</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
