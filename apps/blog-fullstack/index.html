  <style>/* Clear design system v2 */
*, *::before, *::after { box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; }
.font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
.font-mono, code, pre { font-family: 'Geist Mono', monospace; }
#app { margin: 0 auto; }
::selection { background: oklch(var(--color-primary) / 0.15); }

[data-theme="ivory"] {
  color-scheme: light;
  --color-base-100: oklch(100% 0 0);
  --color-base-200: oklch(94% 0.008 240);
  --color-base-300: oklch(88% 0.01 240);
  --color-base-content: oklch(14% 0.02 255);
  --color-primary: oklch(52% 0.22 258);
  --color-primary-content: oklch(100% 0 0);
  --color-secondary: oklch(55% 0.15 200);
  --color-secondary-content: oklch(100% 0 0);
  --color-accent: oklch(60% 0.18 25);
  --color-accent-content: oklch(100% 0 0);
  --color-neutral: oklch(25% 0.01 255);
  --color-neutral-content: oklch(95% 0 0);
  --color-info: oklch(55% 0.18 245);
  --color-info-content: oklch(98% 0.005 245);
  --color-success: oklch(50% 0.17 150);
  --color-success-content: oklch(98% 0.005 150);
  --color-warning: oklch(65% 0.15 80);
  --color-warning-content: oklch(15% 0.02 80);
  --color-error: oklch(55% 0.2 25);
  --color-error-content: oklch(98% 0.005 25);
  --radius-box: 0.625rem; --radius-field: 0.375rem; --radius-selector: 0.25rem;
  --border: 1px; --depth: 0; --noise: 0;
}

  <!-- ┌─────────────────────────────────────────────┐
 │         CLEAR APP — Architecture            │
 └─────────────────────────────────────────────┘

 TABLES:
   Posts: title*, excerpt, body*, category, author_name, author_avatar, image_url, created_at_date (line 10)

 ENDPOINTS:
   GET /api/posts (line 25)
   GET /api/posts/:id (line 29)
   POST /api/posts (line 34)
   DELETE /api/posts/:id [auth] (line 41)
   POST /api/seed (line 46)

 PAGES:
   'Blog' at / (line 78)

 DATAFLOW: Frontend ──> API ──> Database -->
  <script>
// --- Runtime ---
function _toast(msg, type) {
  let c = document.getElementById('_toast_container');
  if (!c) {
    c = document.createElement('div'); c.id = '_toast_container';
    c.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;';
    document.body.appendChild(c);
  }
  const icons = {
    error: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    success: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    info: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
  };
  const cls = type === 'error' ? 'alert-error' : type === 'success' ? 'alert-success' : 'alert-info';
  const icon = icons[type] || icons.info;
  const el = document.createElement('div');
  el.className = 'alert ' + cls + ' shadow-lg text-sm';
  el.style.cssText = 'pointer-events:auto;display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;min-width:280px;max-width:400px;border-radius:0.75rem;opacity:0;transform:translateX(1rem);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;';
  el.innerHTML = icon + '<span style="flex:1">' + msg + '</span><div style="position:absolute;bottom:0;left:0;height:3px;background:currentColor;opacity:0.3;animation:_toast_timer 4s linear forwards;width:100%"></div>';
  if (!document.getElementById('_toast_style')) {
    const s = document.createElement('style'); s.id = '_toast_style';
    s.textContent = '@keyframes _toast_timer { from { width: 100% } to { width: 0% } }';
    document.head.appendChild(s);
  }
  c.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateX(0)'; });
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(1rem)'; setTimeout(() => el.remove(), 300); }, 4000);
}
function _esc(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
document.title = "Blog";

// --- State ---
// Reactive model: _state holds all data. _recompute() syncs state to DOM.
// Input listeners update _state, buttons run actions, both call _recompute().
let _state = {
  new_title: "",
  new_category: "",
  new_excerpt: "",
  new_body: "",
  new_author: "",
  new_image: "",
  posts: null,
  selected_post: null
};

// --- Recompute derived values and update displays ---
function _recompute() {
  // Database: local memory (JSON file backup)
  {
    const _tableEl = document.getElementById('output_Posts_table');
    const _data = _state.posts;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["image_url","category","title","excerpt","author_name"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300/20 hover:bg-base-200/60 transition-colors even:bg-base-300/5">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  document.getElementById('input_new_title').value = _state.new_title;
  document.getElementById('input_new_category').value = _state.new_category;
  document.getElementById('input_new_excerpt').value = _state.new_excerpt;
  document.getElementById('input_new_body').value = _state.new_body;
  document.getElementById('input_new_author').value = _state.new_author;
  document.getElementById('input_new_image').value = _state.new_image;
}

// --- Input listeners ---
document.getElementById('input_new_title').addEventListener('input', function(e) {
  _state.new_title = e.target.value;
  _recompute();
});
document.getElementById('input_new_category').addEventListener('input', function(e) {
  _state.new_category = e.target.value;
  _recompute();
});
document.getElementById('input_new_excerpt').addEventListener('input', function(e) {
  _state.new_excerpt = e.target.value;
  _recompute();
});
document.getElementById('input_new_body').addEventListener('input', function(e) {
  _state.new_body = e.target.value;
  _recompute();
});
document.getElementById('input_new_author').addEventListener('input', function(e) {
  _state.new_author = e.target.value;
  _recompute();
});
document.getElementById('input_new_image').addEventListener('input', function(e) {
  _state.new_image = e.target.value;
  _recompute();
});

// --- Button handlers ---
document.getElementById('btn_New_Post').addEventListener('click', function() {
  console.log("New Post");
  _recompute();
});
document.getElementById('btn_Publish').addEventListener('click', async function() {
    if (_state.new_post_data === '' || _state.new_post_data == null) { _toast('new post data is required', 'error'); return; }
  const _btn = document.getElementById('btn_Publish');
  const _btnHTML = _btn.innerHTML;
  _btn.disabled = true;
  _btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';
  try {
    let new_post_data = collect;
    { const _r = await fetch("/api/posts", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ new_post_data: _state.new_post_data }) });
      if (!_r.ok) { const _e = await _r.json().catch(() => ({})); console.error('[POST /api/posts] [clear:116]', _e.error || 'POST failed'); throw new Error(_e.error || _e.message || 'POST failed'); } }
    _state.posts = await fetch("/api/posts").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/posts] [clear:117]', e.message); return _state.posts; });
    console.log(hide);
  } catch(_err) { _toast(_err.message || 'Something went wrong', 'error'); }
  _btn.disabled = false;
  _btn.innerHTML = _btnHTML;
  _recompute();
});
document.getElementById('btn_Cancel').addEventListener('click', function() {
  console.log(hide);
  _recompute();
});

// --- On Page Load ---
_recompute(); // initial render with default state
(async () => {
  try {
    { const _r = await fetch("/api/seed", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nothing: _state.nothing }) });
      if (!_r.ok) { const _e = await _r.json().catch(() => ({})); console.error('[POST /api/seed] [clear:84]', _e.error || 'POST failed'); throw new Error(_e.error || _e.message || 'POST failed'); } }
    _state.posts = await fetch("/api/posts").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/posts] [clear:85]', e.message); return _state.posts; });
  _recompute();
  } catch(e) { console.error("Page load error:", e); }
})();

  </script>
