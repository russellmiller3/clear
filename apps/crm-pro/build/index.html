  <script>
// --- Runtime ---
function _toast(msg, type) {
  let c = document.getElementById('_toast_container');
  if (!c) {
    c = document.createElement('div'); c.id = '_toast_container';
    c.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;';
    document.body.appendChild(c);
  }
  const icons = {
    error: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    success: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    info: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
  };
  const cls = type === 'error' ? 'alert-error' : type === 'success' ? 'alert-success' : 'alert-info';
  const icon = icons[type] || icons.info;
  const el = document.createElement('div');
  el.className = 'alert ' + cls + ' shadow-lg text-sm';
  el.style.cssText = 'pointer-events:auto;display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;min-width:280px;max-width:400px;border-radius:0.75rem;opacity:0;transform:translateX(1rem);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;';
  el.innerHTML = icon + '<span style="flex:1">' + msg + '</span><div style="position:absolute;bottom:0;left:0;height:3px;background:currentColor;opacity:0.3;animation:_toast_timer 4s linear forwards;width:100%"></div>';
  if (!document.getElementById('_toast_style')) {
    const s = document.createElement('style'); s.id = '_toast_style';
    s.textContent = '@keyframes _toast_timer { from { width: 100% } to { width: 0% } }';
    document.head.appendChild(s);
  }
  c.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateX(0)'; });
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(1rem)'; setTimeout(() => el.remove(), 300); }, 4000);
}
function _esc(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
document.title = "CRM Pro";

// --- State ---
// Reactive model: _state holds all data. _recompute() syncs state to DOM.
// Input listeners update _state, buttons run actions, both call _recompute().
let _state = {
  search_query: "",
  contact_name: "",
  contact_email: "",
  contact_company: "",
  contact_phone: "",
  status: "",
  source: "",
  deal_title: "",
  deal_contact_id: "",
  deal_value: 0,
  stage: "",
  deal_probability: 0,
  expected_close: "",
  activity_contact_id: "",
  action: "",
  activity_detail: "",
  contacts: null,
  deals: null,
  activities: null,
  _editing_id: null
};

// --- Recompute derived values and update displays ---
function _recompute() {
  // clear:31
  // Database: local memory (JSON file backup)
  {
    const _tableEl = document.getElementById('output_Contacts_table');
    const _data = _state.contacts;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["name","email","company","status","source"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('') + '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50"></th>';
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '<td class="text-right">' + '<button class="btn btn-ghost btn-xs" data-edit-id="' + _esc(row.id) + '" data-edit-row="' + _esc(JSON.stringify(row)) + '">Edit</button>' + ' ' + '<button class="btn btn-ghost btn-xs text-error" data-delete-id="' + _esc(row.id) + '">Delete</button>' + '</td>' + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _tableEl = document.getElementById('output_Deals_table');
    const _data = _state.deals;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["title","value","stage","probability","expected_close"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('') + '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50"></th>';
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '<td class="text-right">' + '<button class="btn btn-ghost btn-xs" data-edit-id="' + _esc(row.id) + '" data-edit-row="' + _esc(JSON.stringify(row)) + '">Edit</button>' + ' ' + '<button class="btn btn-ghost btn-xs text-error" data-delete-id="' + _esc(row.id) + '">Delete</button>' + '</td>' + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _tableEl = document.getElementById('output_Activities_table');
    const _data = _state.activities;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["action","detail","performed_by"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _chartEl = document.getElementById('chart_Pipeline_canvas');
    const _data = _state.deals;
    if (_chartEl && Array.isArray(_data) && _data.length > 0 && typeof echarts !== 'undefined') {
      const _chart = echarts.getInstanceByDom(_chartEl) || echarts.init(_chartEl);
      const _keys = Object.keys(_data[0]).filter(k => k !== 'id');
      const _xKey = _keys.find(k => typeof _data[0][k] === 'string') || _keys[0];
      const _yKeys = _keys.filter(k => typeof _data[0][k] === 'number');
      if (_yKeys.length === 0) _yKeys.push(_keys.find(k => k !== _xKey) || _keys[0]);
      const _xData = _data.map(r => r[_xKey]);
      const _series = _yKeys.map(k => ({ name: k, type: 'bar', data: _data.map(r => Number(r[k]) || 0), smooth: true }));
      _chart.setOption({ tooltip: { trigger: 'axis' }, legend: _yKeys.length > 1 ? { data: _yKeys } : undefined, xAxis: { type: 'category', data: _xData }, yAxis: { type: 'value' }, series: _series, grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true } }, true);
    }
  }
  document.getElementById('input_search_query').value = _state.search_query;
  document.getElementById('input_contact_name').value = _state.contact_name;
  document.getElementById('input_contact_email').value = _state.contact_email;
  document.getElementById('input_contact_company').value = _state.contact_company;
  document.getElementById('input_contact_phone').value = _state.contact_phone;
  document.getElementById('input_status').value = _state.status;
  document.getElementById('input_source').value = _state.source;
  document.getElementById('input_deal_title').value = _state.deal_title;
  document.getElementById('input_deal_contact_id').value = _state.deal_contact_id;
  document.getElementById('input_deal_value').value = _state.deal_value;
  document.getElementById('input_stage').value = _state.stage;
  document.getElementById('input_deal_probability').value = _state.deal_probability;
  document.getElementById('input_expected_close').value = _state.expected_close;
  document.getElementById('input_activity_contact_id').value = _state.activity_contact_id;
  document.getElementById('input_action').value = _state.action;
  document.getElementById('input_activity_detail').value = _state.activity_detail;
}

// --- Input listeners ---
document.getElementById('input_search_query').addEventListener('input', function(e) {
  _state.search_query = e.target.value;
  _recompute();
});
document.getElementById('input_contact_name').addEventListener('input', function(e) {
  _state.contact_name = e.target.value;
  _recompute();
});
document.getElementById('input_contact_email').addEventListener('input', function(e) {
  _state.contact_email = e.target.value;
  _recompute();
});
document.getElementById('input_contact_company').addEventListener('input', function(e) {
  _state.contact_company = e.target.value;
  _recompute();
});
document.getElementById('input_contact_phone').addEventListener('input', function(e) {
  _state.contact_phone = e.target.value;
  _recompute();
});
document.getElementById('input_status').addEventListener('input', function(e) {
  _state.status = e.target.value;
  _recompute();
});
document.getElementById('input_source').addEventListener('input', function(e) {
  _state.source = e.target.value;
  _recompute();
});
document.getElementById('input_deal_title').addEventListener('input', function(e) {
  _state.deal_title = e.target.value;
  _recompute();
});
document.getElementById('input_deal_contact_id').addEventListener('input', function(e) {
  _state.deal_contact_id = e.target.value;
  _recompute();
});
document.getElementById('input_deal_value').addEventListener('input', function(e) {
  _state.deal_value = Number(e.target.value) || 0;
  _recompute();
});
document.getElementById('input_stage').addEventListener('input', function(e) {
  _state.stage = e.target.value;

// --- Table action handlers for contacts ---
document.getElementById('output_Contacts_table').addEventListener('click', async function(e) {
  const deleteBtn = e.target.closest('[data-delete-id]');
  if (deleteBtn) {
    const id = deleteBtn.dataset.deleteId;
    await fetch("/api/contacts/" + id, { method: 'DELETE' }).catch(e => console.error(e));
    _state.contacts = await fetch("/api/contacts").then(r => r.json()).catch(e => { console.error(e); return _state.contacts; });
    _recompute();
    return;
  }
  const editBtn = e.target.closest('[data-edit-id]');
  if (editBtn) {
    const id = editBtn.dataset.editId;
    const row = JSON.parse(editBtn.dataset.editRow);
    _state.status = row.status != null ? row.status : '';
    _state.source = row.source != null ? row.source : '';
    _state._editing_id = id;
    _recompute();
    return;
  }
});
