<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM - GAN Target</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .sidebar { width: 240px; flex-shrink: 0; background: oklch(0.18 0.02 265); }
    .sidebar-link { display: block; padding: 0.625rem 1rem; border-radius: 0.5rem; color: oklch(0.7 0.01 265); font-size: 0.875rem; cursor: pointer; }
    .sidebar-link:hover, .sidebar-link.active { background: oklch(0.25 0.03 265); color: oklch(0.95 0 0); }
  </style>
</head>
<body class="min-h-screen bg-base-100">
  <main id="app" class="">
    <div style="display:flex; height:100vh; overflow:hidden;">
      <!-- Sidebar -->
      <aside class="sidebar flex flex-col p-4 gap-1">
        <h2 class="text-lg font-bold text-white px-2 mb-4">CRM</h2>
        <a class="sidebar-link active">Dashboard</a>
        <a class="sidebar-link">Contacts</a>
        <a class="sidebar-link">Deals</a>
        <a class="sidebar-link">Activity</a>
      </aside>
      <!-- Main -->
      <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <!-- Header -->
        <header style="padding:1rem 1.5rem; border-bottom:1px solid oklch(0.3 0.01 265); display:flex; align-items:center; justify-content:space-between;">
          <h1 class="text-xl font-semibold">Dashboard</h1>
          <span class="text-sm opacity-60">Q2 2026</span>
        </header>
        <!-- Content -->
        <div style="flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1.5rem;">
          <!-- Metric Cards -->
          <div class="grid grid-cols-3 gap-4">
            <div class="card bg-base-200 p-5">
              <div class="text-sm opacity-60">Contacts</div>
              <div class="text-2xl font-bold mt-1">247</div>
            </div>
            <div class="card bg-base-200 p-5">
              <div class="text-sm opacity-60">Open Deals</div>
              <div class="text-2xl font-bold mt-1">18</div>
            </div>
            <div class="card bg-base-200 p-5">
              <div class="text-sm opacity-60">Revenue</div>
              <div class="text-2xl font-bold mt-1">$42,300</div>
            </div>
          </div>
          <!-- Recent Contacts Table -->
          <div class="card bg-base-200 p-5">
            <h3 class="font-semibold mb-3">Recent Contacts</h3>
            <table class="table table-sm">
              <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th></tr></thead>
              <tbody>
                <tr><td>Alice Chen</td><td>alice@acme.co</td><td>Acme Inc</td><td><span class="badge badge-success badge-sm">Active</span></td></tr>
                <tr><td>Bob Smith</td><td>bob@globex.io</td><td>Globex</td><td><span class="badge badge-warning badge-sm">Lead</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
