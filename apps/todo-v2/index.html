<!DOCTYPE html>
<html lang="en" data-theme="ivory">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-base-200 min-h-screen">
  <main id="app" class="max-w-2xl mx-auto p-8">
    <h1 class="text-3xl font-bold tracking-tight mb-6">Todos</h1>
    <div class="form-control mb-4">
      <label class="text-xs font-medium text-base-content/50 uppercase tracking-wide mb-1" for="input_todo">What needs to be done?</label>
      <input id="input_todo" class="input input-bordered w-full bg-base-200" type="text" placeholder="What needs to be done?">
    </div>
    <button class="btn btn-primary btn-sm" id="btn_Add">Add</button>
    <button class="btn btn-primary btn-sm" id="btn_Refresh">Refresh</button>
    <div class="overflow-hidden rounded-xl border border-base-300/50 bg-base-200 mb-4" id="output_Todos">
      <div class="text-xs font-medium text-base-content/50 uppercase tracking-wide px-4 pt-3">Todos</div>
      <table class="table table-sm" id="output_Todos_table">
        <thead><tr class="bg-base-300/30 text-xs uppercase tracking-wide text-base-content/40"></tr></thead>
        <tbody class="text-sm"></tbody>
      </table>
    </div>
  </main>

  <script>
// --- Runtime ---
function _esc(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
document.title = "Todo App";

// --- State ---
let _state = {
  todo: "",
  todos: null
};

// --- Recompute derived values and update displays ---
function _recompute() {
  {
    const _tableEl = document.getElementById('output_Todos_table');
    const _data = _state.todos;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["todo","completed"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th>' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr>' + _keys.map(k => '<td>' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  document.getElementById('input_todo').value = _state.todo;
}

// --- Input listeners ---
document.getElementById('input_todo').addEventListener('input', function(e) {
  _state.todo = e.target.value;
  _recompute();
});

// --- Button handlers ---
document.getElementById('btn_Add').addEventListener('click', async function() {
  await fetch("/api/todos", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ todo: _state.todo }) }).catch(e => console.error(e));
  _state.todos = await fetch("/api/todos").then(r => r.json()).catch(e => { console.error(e); return _state.todos; });
  _state.todo = "";
  _recompute();
});
document.getElementById('btn_Refresh').addEventListener('click', async function() {
  _state.todos = await fetch("/api/todos").then(r => r.json()).catch(e => { console.error(e); return _state.todos; });
  _recompute();
});

// --- On Page Load ---
(async () => {
  _state.todos = await fetch("/api/todos").then(r => r.json()).catch(e => { console.error(e); return _state.todos; });
  _recompute();
})();

  </script>
</body>
</html>
