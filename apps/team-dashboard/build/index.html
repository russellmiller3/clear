<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Geist+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>/* Clear design system v2 */
*, *::before, *::after { box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; }
.font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
.font-mono, code, pre { font-family: 'Geist Mono', monospace; }
#app { margin: 0 auto; }
::selection { background: oklch(var(--color-primary) / 0.15); }

[data-theme="midnight"] {
  color-scheme: dark;
  --color-base-100: oklch(13% 0.02 250);
  --color-base-200: oklch(10% 0.02 255);
  --color-base-300: oklch(18% 0.015 250);
  --color-base-content: oklch(88% 0.025 240);
  --color-primary: oklch(62% 0.18 250);
  --color-primary-content: oklch(98% 0.005 250);
  --color-secondary: oklch(58% 0.12 155);
  --color-secondary-content: oklch(10% 0.02 155);
  --color-accent: oklch(78% 0.14 85);
  --color-accent-content: oklch(12% 0.02 85);
  --color-neutral: oklch(20% 0.015 250);
  --color-neutral-content: oklch(80% 0.02 240);
  --color-info: oklch(68% 0.12 245);
  --color-info-content: oklch(10% 0.02 245);
  --color-success: oklch(62% 0.14 155);
  --color-success-content: oklch(10% 0.02 155);
  --color-warning: oklch(78% 0.14 85);
  --color-warning-content: oklch(15% 0.02 85);
  --color-error: oklch(60% 0.2 25);
  --color-error-content: oklch(10% 0.02 25);
  --radius-box: 0.75rem; --radius-field: 0.5rem; --radius-selector: 0.375rem;
  --border: 1px; --depth: 0; --noise: 0;
}

.clear-section { padding: 1.5rem; }
.clear-section-card {
  margin-bottom: 2rem;
  background: oklch(var(--b2)); border: 1px solid oklch(var(--b3) / 0.5);
  border-radius: 0.75rem; padding: 1.5rem;
}</style>
</head>
<body class="min-h-screen bg-base-100">
  <main id="app" class="">
    <div class="flex h-screen overflow-hidden">
    <div class="w-60 shrink-0 flex flex-col bg-base-200 border-r border-base-300 overflow-hidden">
    <div class="px-5 py-4 border-b border-base-300 shrink-0"><span class="text-base font-bold text-base-content tracking-tight">Projects</span></div>
    <div class="bg-base-100 rounded-box border border-base-300 overflow-hidden" id="output_Projects">
      <div class="px-6 py-4 border-b border-base-300">
        <h3 class="text-sm font-semibold text-base-content">Projects</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="table table-sm w-full" id="output_Projects_table">
          <thead><tr class="border-base-300"><th class="text-xs uppercase tracking-widest font-semibold text-base-content/50"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <h2 class="text-xl font-semibold text-base-content tracking-tight mt-6 mb-3">New Project</h2>
    <fieldset class="fieldset mb-4">
      <legend class="fieldset-legend text-xs uppercase tracking-widest font-semibold text-base-content/50">Name</legend>
      <input id="input_project_name" class="input input-bordered w-full" type="text" placeholder="Name">
    </fieldset>
    <fieldset class="fieldset mb-4">
      <legend class="fieldset-legend text-xs uppercase tracking-widest font-semibold text-base-content/50">Owner</legend>
      <input id="input_project_owner" class="input input-bordered w-full" type="text" placeholder="Owner">
    </fieldset>
    <button class="btn btn-primary" id="btn_Add_Project">Add Project</button>
    </div>
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <div class="sticky top-0 z-20 flex items-center justify-between h-16 px-6 bg-base-100 border-b border-base-300 shrink-0">
    <h1 class="text-base font-semibold text-base-content">Team Dashboard</h1>
    <p class="text-sm text-base-content/70 leading-relaxed mb-3">Track projects and tasks</p>
    </div>
    <div class="flex-1 overflow-y-auto bg-base-100 p-6 flex flex-col gap-5">
    <div class="clear-section grid grid-cols-2 gap-6">
    <div class="bg-base-200 rounded-box p-5">
    <h1 class="text-3xl font-bold text-base-content tracking-tight leading-snug mb-4">Projects</h1>
    <div class="bg-base-100 rounded-box border border-base-300 overflow-hidden" id="output_Projects_2">
      <div class="px-6 py-4 border-b border-base-300">
        <h3 class="text-sm font-semibold text-base-content">Projects</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="table table-sm w-full" id="output_Projects_2_table">
          <thead><tr class="border-base-300"><th class="text-xs uppercase tracking-widest font-semibold text-base-content/50"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    </div>
    <div class="bg-base-200 rounded-box p-5">
    <h1 class="text-3xl font-bold text-base-content tracking-tight leading-snug mb-4">Tasks</h1>
    <div class="bg-base-100 rounded-box border border-base-300 overflow-hidden" id="output_Tasks">
      <div class="px-6 py-4 border-b border-base-300">
        <h3 class="text-sm font-semibold text-base-content">Tasks</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="table table-sm w-full" id="output_Tasks_table">
          <thead><tr class="border-base-300"><th class="text-xs uppercase tracking-widest font-semibold text-base-content/50"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    </div>
    </div>
    <div class="divider my-4"></div>
    <div class="bg-base-200 rounded-box p-5">
    <h2 class="text-xl font-semibold text-base-content tracking-tight mt-6 mb-3">New Task</h2>
    <fieldset class="fieldset mb-4">
      <legend class="fieldset-legend text-xs uppercase tracking-widest font-semibold text-base-content/50">Title</legend>
      <input id="input_task_title" class="input input-bordered w-full" type="text" placeholder="Title">
    </fieldset>
    <fieldset class="fieldset mb-4">
      <legend class="fieldset-legend text-xs uppercase tracking-widest font-semibold text-base-content/50">Project</legend>
      <input id="input_task_project" class="input input-bordered w-full" type="text" placeholder="Project">
    </fieldset>
    <fieldset class="fieldset mb-4">
      <legend class="fieldset-legend text-xs uppercase tracking-widest font-semibold text-base-content/50">Assignee</legend>
      <input id="input_task_assignee" class="input input-bordered w-full" type="text" placeholder="Assignee">
    </fieldset>
    <button class="btn btn-primary" id="btn_Add_Task">Add Task</button>
    </div>
    </div>
    </div>
    </div>
  </main>

  <script>
// --- Runtime ---
function _toast(msg, type) {
  let c = document.getElementById('_toast_container');
  if (!c) {
    c = document.createElement('div'); c.id = '_toast_container';
    c.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;';
    document.body.appendChild(c);
  }
  const icons = {
    error: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    success: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    info: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
  };
  const cls = type === 'error' ? 'alert-error' : type === 'success' ? 'alert-success' : 'alert-info';
  const icon = icons[type] || icons.info;
  const el = document.createElement('div');
  el.className = 'alert ' + cls + ' shadow-lg text-sm';
  el.style.cssText = 'pointer-events:auto;display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;min-width:280px;max-width:400px;border-radius:0.75rem;opacity:0;transform:translateX(1rem);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;';
  el.innerHTML = icon + '<span style="flex:1">' + msg + '</span><div style="position:absolute;bottom:0;left:0;height:3px;background:currentColor;opacity:0.3;animation:_toast_timer 4s linear forwards;width:100%"></div>';
  if (!document.getElementById('_toast_style')) {
    const s = document.createElement('style'); s.id = '_toast_style';
    s.textContent = '@keyframes _toast_timer { from { width: 100% } to { width: 0% } }';
    document.head.appendChild(s);
  }
  c.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateX(0)'; });
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(1rem)'; setTimeout(() => el.remove(), 300); }, 4000);
}
function _esc(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
document.title = "Team Dashboard";

// --- State ---
// Reactive model: _state holds all data. _recompute() syncs state to DOM.
// Input listeners update _state, buttons run actions, both call _recompute().
let _state = {
  project_name: "",
  project_owner: "",
  task_title: "",
  task_project: "",
  task_assignee: "",
  projects: null,
  tasks: null
};

// --- Recompute derived values and update displays ---
function _recompute() {
  // clear:6
  // Database: local memory (JSON file backup)
  {
    const _tableEl = document.getElementById('output_Projects_table');
    const _data = _state.projects;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["name","status"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _tableEl = document.getElementById('output_Projects_table');
    const _data = _state.projects;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["name","owner","status"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _tableEl = document.getElementById('output_Tasks_table');
    const _data = _state.tasks;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["title","project","assignee","status"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th class="text-xs uppercase tracking-widest font-semibold text-base-content/50">' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr class="border-base-300 hover:bg-base-200 transition-colors">' + _keys.map(k => '<td class="text-sm text-base-content">' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  document.getElementById('input_project_name').value = _state.project_name;
  document.getElementById('input_project_owner').value = _state.project_owner;
  document.getElementById('input_task_title').value = _state.task_title;
  document.getElementById('input_task_project').value = _state.task_project;
  document.getElementById('input_task_assignee').value = _state.task_assignee;
}

// --- Input listeners ---
document.getElementById('input_project_name').addEventListener('input', function(e) {
  _state.project_name = e.target.value;
  _recompute();
});
document.getElementById('input_project_owner').addEventListener('input', function(e) {
  _state.project_owner = e.target.value;
  _recompute();
});
document.getElementById('input_task_title').addEventListener('input', function(e) {
  _state.task_title = e.target.value;
  _recompute();
});
document.getElementById('input_task_project').addEventListener('input', function(e) {
  _state.task_project = e.target.value;
  _recompute();
});
document.getElementById('input_task_assignee').addEventListener('input', function(e) {
  _state.task_assignee = e.target.value;
  _recompute();
});

// --- Button handlers ---
document.getElementById('btn_Add_Project').addEventListener('click', async function() {
    if (_state.project_name === '' || _state.project_name == null) { _toast('project name is required', 'error'); return; }
    if (_state.project_owner === '' || _state.project_owner == null) { _toast('project owner is required', 'error'); return; }
  const _btn = document.getElementById('btn_Add_Project');
  const _btnHTML = _btn.innerHTML;
  _btn.disabled = true;
  _btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';
  try {
    { const _r = await fetch("/api/projects", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project_name: _state.project_name, project_owner: _state.project_owner }) });
      if (!_r.ok) { const _e = await _r.json().catch(() => ({})); throw new Error(_e.error || _e.message || 'POST failed'); } }
    _state.projects = await fetch("/api/projects").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/projects]', e.message); return _state.projects; });
    _state.project_name = "";
    _state.project_owner = "";
  } catch(_err) { _toast(_err.message || 'Something went wrong', 'error'); }
  _btn.disabled = false;
  _btn.innerHTML = _btnHTML;
  _recompute();
});
document.getElementById('btn_Add_Task').addEventListener('click', async function() {
    if (_state.task_title === '' || _state.task_title == null) { _toast('task title is required', 'error'); return; }
    if (_state.task_project === '' || _state.task_project == null) { _toast('task project is required', 'error'); return; }
    if (_state.task_assignee === '' || _state.task_assignee == null) { _toast('task assignee is required', 'error'); return; }
  const _btn = document.getElementById('btn_Add_Task');
  const _btnHTML = _btn.innerHTML;
  _btn.disabled = true;
  _btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';
  try {
    { const _r = await fetch("/api/tasks", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task_title: _state.task_title, task_project: _state.task_project, task_assignee: _state.task_assignee }) });
      if (!_r.ok) { const _e = await _r.json().catch(() => ({})); throw new Error(_e.error || _e.message || 'POST failed'); } }
    _state.tasks = await fetch("/api/tasks").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/tasks]', e.message); return _state.tasks; });
    _state.task_title = "";
    _state.task_project = "";
    _state.task_assignee = "";
  } catch(_err) { _toast(_err.message || 'Something went wrong', 'error'); }
  _btn.disabled = false;
  _btn.innerHTML = _btnHTML;
  _recompute();
});

// --- On Page Load ---
(async () => {
  _state.projects = await fetch("/api/projects").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/projects]', e.message); return _state.projects; });
  _state.tasks = await fetch("/api/tasks").then(r => { if (!r.ok) throw new Error('Failed to load data'); return r.json(); }).catch(e => { console.error('[GET /api/tasks]', e.message); return _state.tasks; });
  _recompute();
})();

  </script>
</body>
</html>
