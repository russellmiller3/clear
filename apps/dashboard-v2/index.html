<!DOCTYPE html>
<html lang="en" data-theme="ivory">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-base-100">
  <main id="app" class="h-screen">
    <div class="clear-section section-app">
    <div class="clear-section section-sidebar">
    <h1 class="text-3xl font-bold tracking-tight mb-6">Models</h1>
    <p class="text-base text-base-content/80 leading-relaxed mb-3">Your trained models and results.</p>
    <div class="divider my-8"></div>
    <div class="form-control mb-4">
      <label class="text-xs font-medium text-base-content/50 uppercase tracking-wide mb-1" for="input_search">Search</label>
      <input id="input_search" class="input input-bordered w-full bg-base-200" type="text" placeholder="Search">
    </div>
    <div class="divider my-8"></div>
    <h2 class="text-xl font-semibold mt-6 mb-3">Recent</h2>
    <div class="overflow-hidden rounded-xl border border-base-300/50 bg-base-200 mb-4" id="output_Models">
      <div class="text-xs font-medium text-base-content/50 uppercase tracking-wide px-4 pt-3">Models</div>
      <table class="table table-sm" id="output_Models_table">
        <thead><tr class="bg-base-300/30 text-xs uppercase tracking-wide text-base-content/40"></tr></thead>
        <tbody class="text-sm"></tbody>
      </table>
    </div>
    </div>
    <div class="clear-section section-main">
    <div class="clear-section section-header">
    <h1 class="text-3xl font-bold tracking-tight mb-6">Results Dashboard</h1>
    <div class="form-control mb-4">
      <label class="text-xs font-medium text-base-content/50 uppercase tracking-wide mb-1" for="input_model_name">Model Name</label>
      <input id="input_model_name" class="input input-bordered w-full bg-base-200" type="text" placeholder="Model Name">
    </div>
    </div>
    <div class="clear-section section-tabs">
    <button class="btn btn-primary btn-sm" id="btn_Overview">Overview</button>
    <button class="btn btn-primary btn-sm" id="btn_Add_Model">Add Model</button>
    </div>
    <div class="clear-section section-content">
    <div class="clear-section section-metrics">
    <div class="clear-section style-metric_card">
      <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-3xl font-bold tracking-tight mb-6">92.4%</h1>
    <p class="text-base text-base-content/80 leading-relaxed mb-3">Model Accuracy</p>
      </div>
    </div>
    <div class="clear-section style-metric_card">
      <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-3xl font-bold tracking-tight mb-6">89.1%</h1>
    <p class="text-base text-base-content/80 leading-relaxed mb-3">Precision Score</p>
      </div>
    </div>
    <div class="clear-section style-metric_card">
      <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-3xl font-bold tracking-tight mb-6">94.7%</h1>
    <p class="text-base text-base-content/80 leading-relaxed mb-3">Recall Score</p>
      </div>
    </div>
    <div class="clear-section style-metric_card">
      <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-3xl font-bold tracking-tight mb-6">91.8%</h1>
    <p class="text-base text-base-content/80 leading-relaxed mb-3">F1 Score</p>
      </div>
    </div>
    </div>
    <div class="divider my-8"></div>
    <div class="clear-section style-card">
      <div class="max-w-5xl mx-auto px-4">
    <h2 class="text-xl font-semibold mt-6 mb-3">All Models</h2>
    <div class="overflow-hidden rounded-xl border border-base-300/50 bg-base-200 mb-4" id="output_Models_2">
      <div class="text-xs font-medium text-base-content/50 uppercase tracking-wide px-4 pt-3">Models</div>
      <table class="table table-sm" id="output_Models_2_table">
        <thead><tr class="bg-base-300/30 text-xs uppercase tracking-wide text-base-content/40"></tr></thead>
        <tbody class="text-sm"></tbody>
      </table>
    </div>
    <button class="btn btn-primary btn-sm" id="btn_Refresh">Refresh</button>
      </div>
    </div>
    </div>
    </div>
    </div>
  </main>

  <script>
// --- Runtime ---
function _esc(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
document.title = "Results Dashboard";

// --- State ---
let _state = {
  search: "",
  model_name: "",
  models: null
};

// --- Recompute derived values and update displays ---
function _recompute() {
  // clear:4
  // Database: local memory (JSON file backup)
  {
    const _tableEl = document.getElementById('output_Models_table');
    const _data = _state.models;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["name","status"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th>' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr>' + _keys.map(k => '<td>' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  {
    const _tableEl = document.getElementById('output_Models_table');
    const _data = _state.models;
    if (_tableEl && Array.isArray(_data) && _data.length > 0) {
      const _keys = ["name","accuracy","status"];
      _tableEl.querySelector('thead tr').innerHTML = _keys.map(k => '<th>' + _esc(k) + '</th>').join('');
      _tableEl.querySelector('tbody').innerHTML = _data.map(row => '<tr>' + _keys.map(k => '<td>' + _esc(row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>').join('');
    } else if (_tableEl) {
      _tableEl.querySelector('thead tr').innerHTML = '';
      _tableEl.querySelector('tbody').innerHTML = '';
    }
  }
  document.getElementById('input_search').value = _state.search;
  document.getElementById('input_model_name').value = _state.model_name;
}

// --- Input listeners ---
document.getElementById('input_search').addEventListener('input', function(e) {
  _state.search = e.target.value;
  _recompute();
});
document.getElementById('input_model_name').addEventListener('input', function(e) {
  _state.model_name = e.target.value;
  _recompute();
});

// --- Button handlers ---
document.getElementById('btn_Overview').addEventListener('click', async function() {
  _state.models = await fetch("/api/models").then(r => r.json()).catch(e => { console.error(e); return _state.models; });
  _recompute();
});
document.getElementById('btn_Add_Model').addEventListener('click', async function() {
  await fetch("/api/models", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model_name: _state.model_name }) }).catch(e => console.error(e));
  _state.models = await fetch("/api/models").then(r => r.json()).catch(e => { console.error(e); return _state.models; });
  _state.model_name = "";
  _recompute();
});
document.getElementById('btn_Refresh').addEventListener('click', async function() {
  _state.models = await fetch("/api/models").then(r => r.json()).catch(e => { console.error(e); return _state.models; });
  _recompute();
});

// --- On Page Load ---
(async () => {
  _state.models = await fetch("/api/models").then(r => r.json()).catch(e => { console.error(e); return _state.models; });
  _recompute();
})();

  </script>
</body>
</html>
