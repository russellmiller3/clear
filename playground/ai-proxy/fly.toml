app = "clear-ai-proxy"
primary_region = "iad"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[services.concurrency]]
  type = "requests"
  soft_limit = 200
  hard_limit = 400

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
