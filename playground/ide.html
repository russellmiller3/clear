<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clear Playground</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234ab8d8'/%3E%3Cstop offset='100%25' stop-color='%231a6a85'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2L4 10v12l12 8 12-8V10L16 2z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M16 2L4 10l12 8 12-8L16 2z' fill='white' opacity='0.25'/%3E%3Cpath d='M4 10l12 8v12L4 22V10z' fill='%23000' opacity='0.1'/%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700&display=swap');

/* Font vars — shared across all themes */
:root {
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 8px;
}

/* Dark theme — html prefix increases specificity over :root */
html[data-theme="dark"] {
  --bg: #0f1117; --bg2: #151821; --bg3: #1c1f2e;
  --bd: rgba(255,255,255,.06); --bd2: rgba(255,255,255,.1);
  --tx: #e2e8f0; --tx2: #a0aec0; --tx3: #5a6578; --tx4: #3a4258;
  --accent: #6c8cff; --accent2: #3b5bdb; --accent-glow: rgba(108,140,255,.12);
  --green: #34d399; --green-bg: rgba(52,211,153,.08);
  --red: #fb7185; --red-bg: rgba(251,113,133,.08);
  --amber: #fbbf24; --amber-bg: rgba(251,191,36,.08);
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  --kw-color: #7aa2f7; --str-color: #9ece6a; --num-color: #ff9e64;
  --cmt-color: #565f89; --op-color: #89ddff; --var-color: #c0caf5; --type-color: #bb9af7;
  --iframe-bg: #fff;
}

/* Light theme (default) */
:root, [data-theme="light"] {
  --bg: #f8f9fb; --bg2: #eef1f5; --bg3: #e2e7ee;
  --bd: rgba(0,0,0,.06); --bd2: rgba(0,0,0,.1);
  --tx: #1a202c; --tx2: #4a5568; --tx3: #a0aec0; --tx4: #cbd5e0;
  --accent: #4361ee; --accent2: #3a50d9; --accent-glow: rgba(67,97,238,.1);
  --green: #059669; --green-bg: rgba(5,150,105,.06);
  --red: #dc2626; --red-bg: rgba(220,38,38,.06);
  --amber: #d97706; --amber-bg: rgba(217,119,6,.06);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
  --kw-color: #2563eb; --str-color: #059669; --num-color: #d97706;
  --cmt-color: #94a3b8; --op-color: #6366f1; --var-color: #334155; --type-color: #7c3aed;
  --iframe-bg: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--tx); font-family: var(--font); font-size: 13px; -webkit-font-smoothing: antialiased; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100vh; }
#toolbar { flex-shrink: 0; height: 46px; display: flex; align-items: center; gap: 10px; padding: 0 16px; background: linear-gradient(180deg, var(--bg2), var(--bg)); border-bottom: 1px solid var(--bd); }
#main-area { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#editor-pane { display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 0; }
#ep-resizer { width: 5px; flex-shrink: 0; background: var(--bd2); cursor: col-resize; transition: background .15s; position: relative; z-index: 10; }
#ep-resizer:hover, #ep-resizer.dragging { background: var(--accent); }
#preview-pane { display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 0; border-left: 1px solid var(--bd); border-right: 1px solid var(--bd); }
#chat-pane { display: flex; flex-direction: column; overflow: hidden; background: var(--bg2); flex: 0 0 360px; min-width: 0; transition: flex-basis .2s ease; }
#chat-pane.collapsed { flex-basis: 0 !important; }
#status-bar { flex-shrink: 0; height: 24px; display: flex; align-items: center; gap: 16px; padding: 0 12px; background: var(--accent2); color: rgba(255,255,255,.8); font-size: 11px; font-family: var(--font); border-top: 1px solid var(--bd); }
#status-bar span { white-space: nowrap; }
.sb-sep { width: 1px; height: 12px; background: rgba(255,255,255,.2); }
#chat-toggle-btn { background: none; border: 1px solid var(--bd2); border-radius: 6px; padding: 3px 10px; cursor: pointer; color: var(--tx3); font-size: 11px; font-weight: 500; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: all .15s; flex-shrink: 0; margin-left: auto; }
#chat-toggle-btn:hover { background: var(--bg3); color: var(--tx); border-color: var(--accent); }
@media (max-width: 1100px) { #chat-pane { width: 0 !important; } }

/* Toolbar */
#toolbar select { background: var(--bg3); color: var(--tx2); border: 1px solid var(--bd2); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-family: var(--font); cursor: pointer; transition: border-color .15s; }
#toolbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.toolbar-sep { width: 1px; height: 22px; background: var(--bd2); }
.toolbar-btn { background: var(--bg3); color: var(--tx2); border: 1px solid var(--bd2); border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.toolbar-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); transform: translateY(-1px); }
.toolbar-btn:active { transform: translateY(0); }
.toolbar-btn.primary { background: var(--accent2); color: #dde4ff; border-color: var(--accent2); }
.toolbar-btn.primary:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 2px 8px rgba(108,140,255,.3); }
#status { font-family: var(--mono); font-size: 11px; font-weight: 500; margin-left: auto; padding: 4px 10px; border-radius: 20px; transition: all .2s; }
.status-ok { color: var(--green); background: var(--green-bg); }
.status-err { color: var(--red); background: var(--red-bg); }
.status-compiling { color: var(--amber); background: var(--amber-bg); }

/* Editor */
#editor-mount { flex: 1; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
#editor-pane .cm-editor { flex: 1; overflow: auto; min-height: 0; }
#editor-pane .cm-editor .cm-scroller { font-family: var(--mono) !important; font-size: 13px !important; line-height: 1.7 !important; }
#editor-pane .cm-editor .cm-content { padding: 16px 0; }
#editor-pane .cm-editor .cm-gutters { background: var(--bg); border-right: 1px solid var(--bd); color: var(--tx4); min-width: 48px; }
#editor-pane .cm-editor .cm-activeLineGutter { background: var(--bg3); color: var(--tx3); }
#editor-pane .cm-editor .cm-activeLine { background: rgba(108,140,255,.03); }
#editor-pane .cm-editor .cm-selectionBackground { background: rgba(108,140,255,.15) !important; }
#editor-pane .cm-editor .cm-cursor { border-left-color: var(--accent); border-left-width: 2px; }
#editor-pane .cm-editor { background: var(--bg); }
#editor-pane .cm-editor .cm-line { caret-color: var(--accent); }
#editor-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--bd); font-size: 11px; font-weight: 600; font-family: var(--font); color: var(--tx3); text-transform: uppercase; letter-spacing: .05em; }
#editor-header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
#editor-header .dot.err { background: var(--red); }
#editor-toc { display: flex; align-items: center; gap: 2px; padding: 3px 10px; background: var(--bg); border-bottom: 1px solid var(--bd); flex-wrap: wrap; min-height: 0; }
#editor-toc:empty { display: none; }
.toc-btn { background: none; border: 1px solid transparent; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: var(--mono); color: var(--tx3); cursor: pointer; transition: all .12s; white-space: nowrap; }
.toc-btn:hover { background: var(--bg3); border-color: var(--bd2); color: var(--accent); }
.toc-btn.toc-sub { font-size: 10px; opacity: .75; padding-left: 6px; }
#errors { padding: 10px 14px; background: var(--bg2); border-top: 1px solid var(--bd); max-height: 130px; overflow-y: auto; font-family: var(--mono); font-size: 11px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
#errors:empty { display: none; }
.error-line { color: var(--red); padding: 3px 0; cursor: pointer; transition: opacity .1s; display: flex; align-items: baseline; gap: 6px; }
.error-line::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.error-line:hover { opacity: .8; }
.warning-line { color: var(--amber); padding: 3px 0; opacity: .8; display: flex; align-items: baseline; gap: 6px; }
.warning-line::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 5px; }

/* Preview */
#preview-tabs { display: flex; gap: 0; background: var(--bg2); border-bottom: 1px solid var(--bd); }
.prev-tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--tx3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; position: relative; }
.prev-tab:hover { color: var(--tx2); }
.prev-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.prev-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%; height: 2px; background: var(--accent); filter: blur(4px); }
#preview-content { flex: 1; overflow: auto; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
#preview-content iframe { width: 100%; height: 100%; border: none; background: var(--iframe-bg); border-radius: 0; }
#preview-content pre { padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.5; color: var(--tx2); white-space: pre-wrap; }
#terminal { flex: 1; overflow: auto; padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.6; color: var(--tx2); background: var(--bg); scrollbar-width: thin; }
.term-cmd { color: var(--accent); }
.term-cmd::before { content: '$ '; color: var(--tx3); }
.term-out { color: var(--tx2); white-space: pre-wrap; }
.term-err { color: var(--red); white-space: pre-wrap; }

/* Data tab */
#data-panel { height: 100%; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 16px; }
.data-table-block { border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; }
.data-table-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--bd); }
.data-table-name { font-family: var(--mono); font-weight: 600; font-size: 12px; color: var(--accent); }
.data-table-count { font-size: 11px; color: var(--tx3); }
.data-refresh-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--bd2); background: none; color: var(--tx2); cursor: pointer; }
.data-refresh-btn:hover { background: var(--bg3); color: var(--accent); }
.data-grid { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-grid th { padding: 6px 10px; background: var(--bg2); color: var(--tx3); font-weight: 500; text-align: left; border-bottom: 1px solid var(--bd); font-family: var(--mono); font-size: 11px; }
.data-grid td { padding: 6px 10px; border-bottom: 1px solid var(--bd); color: var(--tx2); font-family: var(--mono); font-size: 11px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.data-grid tr:last-child td { border-bottom: none; }
.data-grid tr:hover td { background: var(--accent-glow); }
.data-del-btn { background: none; border: none; color: var(--tx4); cursor: pointer; font-size: 13px; padding: 0 4px; border-radius: 3px; }
.data-del-btn:hover { color: var(--red); background: var(--red-bg); }
.data-empty { padding: 20px; text-align: center; color: var(--tx3); font-size: 12px; }
.data-no-app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--tx3); }
.data-no-app .icon { font-size: 28px; opacity: .4; }

/* Meta chips */
#meta-chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 5px 12px; border-bottom: 1px solid var(--bd); min-height: 0; }
#meta-chips:empty { display: none; }
.chip { font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 10px; border: 1px solid var(--bd2); color: var(--tx3); background: var(--bg2); white-space: nowrap; }
.chip.chip-table { color: var(--accent); border-color: var(--accent2); background: var(--accent-glow); }
.chip.chip-agent { color: var(--green); border-color: var(--green); background: var(--green-bg); }
.chip.chip-auth  { color: var(--amber); border-color: var(--amber); background: var(--amber-bg); }
.chip.chip-route { color: var(--tx2); }

/* API tab */
#api-panel { height: 100%; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.ep-card { border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; }
.ep-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); cursor: pointer; user-select: none; }
.ep-header:hover { background: var(--bg3); }
.ep-method { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 44px; text-align: center; }
.ep-get    { background: rgba(52,211,153,.15); color: var(--green); }
.ep-post   { background: rgba(108,140,255,.15); color: var(--accent); }
.ep-put    { background: rgba(251,191,36,.15);  color: var(--amber); }
.ep-delete { background: rgba(251,113,133,.15); color: var(--red); }
.ep-path   { font-family: var(--mono); font-size: 12px; color: var(--tx); flex: 1; }
.ep-body { padding: 10px 12px; border-top: 1px solid var(--bd); display: flex; flex-direction: column; gap: 8px; }
.ep-body textarea { width: 100%; font-family: var(--mono); font-size: 11px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--bd2); border-radius: 4px; color: var(--tx); resize: vertical; min-height: 60px; }
.ep-body input[type=text] { font-family: var(--mono); font-size: 11px; padding: 5px 8px; background: var(--bg); border: 1px solid var(--bd2); border-radius: 4px; color: var(--tx); width: 140px; }
.ep-send-btn { align-self: flex-start; font-size: 11px; padding: 4px 14px; border-radius: 5px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; }
.ep-send-btn:hover { background: var(--accent2); }
.ep-response { font-family: var(--mono); font-size: 11px; padding: 8px 10px; border-radius: 4px; border: 1px solid var(--bd); background: var(--bg); white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow: auto; }
.ep-status-ok  { color: var(--green); font-weight: 600; }
.ep-status-err { color: var(--red);   font-weight: 600; }

/* Chat */
#chat-header { padding: 12px 16px; border-bottom: 1px solid var(--bd); font-size: 13px; font-weight: 600; color: var(--tx2); font-family: var(--font); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(108,140,255,.03), transparent); }
#chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
.msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 92%; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { background: var(--accent2); color: #dde4ff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant { background: var(--bg3); color: var(--tx); align-self: flex-start; border: 1px solid var(--bd); border-bottom-left-radius: 4px; }
.msg pre { background: var(--bg); padding: 10px 12px; border-radius: 6px; margin: 8px 0; font-family: var(--mono); font-size: 12px; line-height: 1.5; overflow-x: auto; position: relative; border: 1px solid var(--bd); }
.msg .apply-btn { position: absolute; top: 6px; right: 6px; background: var(--accent2); color: #dde4ff; border: none; border-radius: 4px; padding: 3px 10px; font-size: 10px; font-weight: 600; cursor: pointer; transition: all .15s; }
.msg .apply-btn:hover { background: var(--accent); transform: translateY(-1px); }
.tool-step { font-size: 11px; color: var(--tx3); padding: 4px 10px; border-left: 2px solid var(--accent2); margin: 6px 0; animation: msgIn .2s ease; }
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
.stream-cursor { animation: cursorBlink .7s step-end infinite; color: var(--accent); }
@keyframes claudeHighlight { 0%,100%{background:transparent} 20%,80%{background:rgba(108,140,255,.3)} }
.cm-claude-line { animation: claudeHighlight 1.8s ease; }
#chat-input-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--bd); background: var(--bg2); }
#chat-input { flex: 1; background: var(--bg3); color: var(--tx); border: 1px solid var(--bd2); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-family: var(--font); resize: none; transition: border-color .15s; }
#chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
#chat-send { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 700; font-family: var(--font); cursor: pointer; transition: all .15s; }
#chat-send:hover { background: var(--accent2); box-shadow: 0 2px 12px rgba(108,140,255,.3); transform: translateY(-1px); }
#chat-send:active { transform: translateY(0); }
#chat-send:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }
#api-key-setup { padding: 24px; text-align: center; color: var(--tx3); font-family: var(--font); }
#api-key-setup input { background: var(--bg3); color: var(--tx); border: 1px solid var(--bd2); border-radius: 8px; padding: 10px; width: 100%; margin: 10px 0; font-family: var(--font); font-size: 12px; transition: border-color .15s; }
#api-key-setup input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
#api-key-setup button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: 700; font-family: var(--font); transition: all .15s; }
#api-key-setup button:hover { background: var(--accent2); transform: translateY(-1px); }

/* Compile animation — shimmer bar across toolbar */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
.status-compiling { animation: pulse .6s ease-in-out infinite; }
@keyframes shimmer { 0% { left: -30%; } 100% { left: 130%; } }
#compile-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; overflow: hidden; pointer-events: none; }
#compile-bar.active::after { content: ''; position: absolute; top: 0; width: 30%; height: 100%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: shimmer .8s ease-in-out infinite; }

/* Button ripple */
.toolbar-btn { position: relative; overflow: hidden; }
.toolbar-btn::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at var(--ripple-x, 50%) var(--ripple-y, 50%), rgba(255,255,255,.2) 0%, transparent 60%); opacity: 0; transition: opacity .3s; }
.toolbar-btn:active::after { opacity: 1; transition: opacity 0s; }

/* Theme toggle */
#theme-toggle { background: none; border: 1px solid var(--bd2); border-radius: 20px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .2s; color: var(--tx3); }
#theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

/* Chat loading indicator */
@keyframes dotPulse { 0%, 80%, 100% { opacity: .2; } 40% { opacity: 1; } }
.typing-indicator { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
.typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--tx3); animation: dotPulse 1.4s ease-in-out infinite; }
.typing-indicator span:nth-child(2) { animation-delay: .2s; }
.typing-indicator span:nth-child(3) { animation-delay: .4s; }

/* Docs overlay */
.doc-h1 { font-size:20px; font-weight:700; color:var(--tx); margin:24px 0 8px; padding-bottom:6px; border-bottom:2px solid var(--bd2); }
.doc-h2 { font-size:15px; font-weight:600; color:var(--accent); margin:20px 0 6px; }
.doc-h3 { font-size:13px; font-weight:600; color:var(--tx2); margin:14px 0 4px; }
.doc-p  { margin:3px 0; color:var(--tx2); }
.doc-gap { height:6px; }
li { margin:2px 0 2px 20px; color:var(--tx2); }
.doc-code { background:var(--bg2); border:1px solid var(--bd); border-radius:6px; padding:12px 14px; font-family:var(--mono); font-size:12px; line-height:1.6; overflow-x:auto; margin:8px 0; color:var(--tx); }
.doc-inline { background:var(--bg3); border:1px solid var(--bd); border-radius:3px; padding:1px 5px; font-family:var(--mono); font-size:11px; color:var(--accent); }
#docs-search:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }

/* Empty state */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--tx3); gap: 8px; padding: 24px; text-align: center; }
.empty-state .icon { font-size: 32px; opacity: .5; margin-bottom: 4px; }
.empty-state .title { font-size: 14px; font-weight: 600; color: var(--tx2); }
.empty-state .hint { font-size: 12px; opacity: .7; }
.empty-state kbd { background: var(--bg3); border: 1px solid var(--bd2); border-radius: 4px; padding: 1px 6px; font-family: var(--mono); font-size: 11px; }

/* Saved toast */
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--tx); border: 1px solid var(--bd2); border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 500; z-index: 1000; animation: toastIn .2s ease, toastOut .3s ease 2s forwards; box-shadow: var(--shadow); }

/* Compile animation — scan lines */
@keyframes scanPulse { 0% { background: rgba(108,140,255,.18); } 100% { background: transparent; } }
.cm-scan-line { animation: scanPulse .35s ease forwards; }

/* Jump-to highlight — flash a line in the editor */
@keyframes lineFlash { 0%,100% { background: transparent; } 20%,60% { background: rgba(251,191,36,.25); } }
.cm-jump-line { animation: lineFlash .9s ease; }

/* Compiled code — line numbers */
#preview-content pre { counter-reset: compiled-line; padding: 0; }
#preview-content pre .cl { counter-increment: compiled-line; display: flex; min-height: 1.5em; }
#preview-content pre .cl::before { content: counter(compiled-line); min-width: 44px; padding: 0 12px 0 16px; color: var(--tx4); font-size: 11px; text-align: right; user-select: none; flex-shrink: 0; border-right: 1px solid var(--bd); margin-right: 12px; line-height: 1.5em; }
#preview-content pre .cl-code { flex: 1; white-space: pre; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx4); }

/* Smooth transitions for theme switch — exclude CodeMirror internals */
#app, #toolbar, #editor-pane, #preview-pane, #chat-pane, #status-bar,
.toolbar-btn, .prev-tab, #chat-header, #chat-input-area, #chat-input,
#chat-send, #errors, .msg, .toast, #theme-toggle, select {
  transition: background-color .2s, border-color .2s, color .15s;
}
</style>
</head>
<body>
<div id="app">
  <!-- Toolbar -->
  <div id="toolbar" style="position:relative;">
    <span style="display:flex;align-items:center;gap:7px;">
      <svg width="22" height="22" viewBox="0 0 32 32" style="flex-shrink:0"><defs><linearGradient id="clr-lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4ab8d8"/><stop offset="100%" stop-color="#1a6a85"/></linearGradient></defs><path d="M16 2L4 10v12l12 8 12-8V10L16 2z" fill="url(#clr-lg)" opacity="0.9"/><path d="M16 2L4 10l12 8 12-8L16 2z" fill="white" opacity="0.25"/><path d="M4 10l12 8v12L4 22V10z" fill="#000" opacity="0.1"/></svg>
      <span style="font-family:'Orbitron',sans-serif;font-weight:700;color:var(--accent);font-size:14px;letter-spacing:.5px;">Clear</span><span style="font-family:var(--font);color:var(--tx3);font-weight:400;font-size:11px;letter-spacing:0;">playground</span>
    </span>
    <span class="toolbar-sep"></span>
    <button class="toolbar-btn" onclick="newFile()">New</button>
    <button class="toolbar-btn" onclick="document.getElementById('load-file-input').click()" title="Load a .clear file from disk">Load</button>
    <input type="file" id="load-file-input" accept=".clear,.txt" style="display:none">
    <select id="template-picker"><option value="">Templates...</option></select>
    <span class="toolbar-sep"></span>
    <button class="toolbar-btn" onclick="doCompile()" title="Ctrl+S">Compile</button>
    <button id="run-btn" class="toolbar-btn primary" onclick="doRun()" title="Ctrl+Enter" style="display:none">Run</button>
    <button id="stop-btn" class="toolbar-btn" onclick="doStop()" style="display:none">Stop</button>
    <span class="toolbar-sep"></span>
    <button class="toolbar-btn" onclick="doSave()" title="Save to Desktop">Save</button>
    <button id="download-btn" class="toolbar-btn" onclick="doDownload()" title="Download compiled HTML" style="display:none">Download</button>
    <button class="toolbar-btn" onclick="openDocs('syntax')" title="Syntax reference">Syntax</button>
    <button class="toolbar-btn" onclick="openDocs('user-guide')" title="User guide">Guide</button>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
    <span id="status" class="status-ok">Ready</span>
    <button id="chat-toggle-btn" onclick="toggleChat()" title="Toggle Claude panel">Hide Chat ◀</button>
    <div id="compile-bar"></div>
  </div>

  <div id="main-area">

  <!-- Editor -->
  <div id="editor-pane">
    <div id="editor-header">
      <span><span class="dot" id="compile-dot"></span> <span id="editor-label">main.clear</span></span>
      <button id="quote-btn" class="toolbar-btn" onclick="quoteSelectionInChat()" title="Quote selection in Claude chat (Ctrl+Shift+C)" style="display:none;font-size:11px;padding:2px 8px;">Quote in Chat</button>
    </div>
    <div id="editor-toc"></div>
    <div id="editor-mount"></div>
    <div id="errors"></div>
  </div>

  <!-- Drag resizer -->
  <div id="ep-resizer"></div>

  <!-- Preview / Terminal -->
  <div id="preview-pane">
    <div id="preview-tabs">
      <button class="prev-tab active" onclick="showTab('compiled')">Compiled Code</button>
      <button class="prev-tab" onclick="showTab('output')">Output</button>
      <button class="prev-tab" onclick="showTab('terminal')">Terminal</button>
      <button class="prev-tab" onclick="showTab('data')" id="data-tab-btn" style="display:none">Data</button>
      <button class="prev-tab" onclick="showTab('api')" id="api-tab-btn" style="display:none">API</button>
    </div>
    <div id="meta-chips"></div>
    <div id="preview-content">
      <div class="empty-state">
        <div class="icon">&#9654;</div>
        <div class="title">No preview yet</div>
        <div class="hint">Start typing Clear code or pick a template</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-pane">
    <div id="chat-header">
      <span style="display:flex;align-items:center;gap:6px;">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--green);"></span>
        Claude Agent
      </span>
      <span style="display:flex;align-items:center;gap:6px;">
        <label id="web-toggle-label" title="Enable web search and fetch — Claude can look up URLs and search the web" style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:var(--tx2);user-select:none;">
          <input type="checkbox" id="web-tools-toggle" style="cursor:pointer;" onchange="updateWebToggle()">
          Web
        </label>
        <button class="toolbar-btn" onclick="showKeySetup()" style="font-size:11px;padding:2px 8px;">API Key</button>
      </span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="2" placeholder="Ask Claude to build something... (Enter to send)"></textarea>
      <button id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>

  </div><!-- /#main-area -->

  <!-- Status Bar -->
  <div id="status-bar">
    <span id="sb-lines">Lines: 4</span>
    <span class="sb-sep"></span>
    <span id="sb-cursor">Ln 1, Col 1</span>
    <span class="sb-sep"></span>
    <span id="sb-target">No target</span>
    <span class="sb-sep"></span>
    <span id="sb-compile-stats" style="display:none"></span>
    <span style="flex:1"></span>
    <span>Clear v1.0</span>
    <span class="sb-sep"></span>
    <span id="sb-shortcuts">Ctrl+S compile &middot; Ctrl+Enter run &middot; Ctrl+K chat</span>
  </div>
</div>

<!-- Docs overlay -->
<div id="docs-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(2px)" onclick="if(event.target===this)closeDocs()">
  <div id="docs-panel" style="position:absolute;top:0;right:0;bottom:0;width:min(720px,90vw);background:var(--bg);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.2);border-left:1px solid var(--bd)">
    <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0">
      <button class="toolbar-btn" id="docs-tab-syntax" onclick="openDocs('syntax')" style="font-size:12px">Syntax Reference</button>
      <button class="toolbar-btn" id="docs-tab-guide" onclick="openDocs('user-guide')" style="font-size:12px">User Guide</button>
      <span style="flex:1"></span>
      <input id="docs-search" type="search" placeholder="Search..." style="background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--tx);width:180px;outline:none" oninput="filterDocs(this.value)">
      <button onclick="closeDocs()" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;padding:0 4px;line-height:1" title="Close">✕</button>
    </div>
    <div id="docs-content" style="flex:1;overflow-y:auto;padding:24px 32px;font-family:var(--font);font-size:13px;line-height:1.7;color:var(--tx)"></div>
  </div>
</div>

<script type="module">
import { EditorView, keymap, lineNumbers, highlightActiveLineGutter, highlightActiveLine, drawSelection } from './codemirror.bundle.js';
import { EditorState } from './codemirror.bundle.js';
import { syntaxHighlighting, StreamLanguage, HighlightStyle } from './codemirror.bundle.js';
import { defaultKeymap, history, historyKeymap, indentWithTab } from './codemirror.bundle.js';
import { tags } from './codemirror.bundle.js';

// ==========================================================================
// CLEAR SYNTAX HIGHLIGHTING
// ==========================================================================
const clearKeywords = new Set([
  'build','for','web','and','javascript','python','backend',
  'database','is','local','memory','create','table','required','default','auto',
  'when','user','calls','GET','POST','PUT','DELETE','sending','receiving','receives',
  'send','back','with','success','message',
  'requires','auth','role',
  'page','at','section','style','heading','subheading','text','bold','italic','link','divider',
  'button','display','as','input','saved','checkbox','dropdown','number','text',
  'on','load','get','from','to',
  'if','then','otherwise','true','false',
  'set','define','function','return','show',
  'for','each','in','repeat','times','while','less','than','greater','equal',
  'increase','decrease','by',
  'agent','ask','claude','ai','returning','JSON',
  'can','use','must','not','remember','conversation','context','knows','about',
  'workflow','state','has','step','track','progress','save',
  'pipeline','call','run','do','these','the','same','time',
  'policy','block','schema','changes','deletes','without','filter','protect','tables',
  'prompt','injection','mass','emails',
  'try','error','an','empty','list',
  'test','expect','mock','responding',
  'validate','log','every','request','allow','cross-origin','requests',
  'nothing','null','missing','checked',
  'look','up','all','where','remove','update','using','this','id',
  'navigate',
  'store','restore',
]);

const clearLang = StreamLanguage.define({
  startState: () => ({ inComment: false }),
  token(stream, state) {
    if (stream.match(/^#.*/)) return 'comment';
    if (stream.match(/^'[^']*'/)) return 'string';
    if (stream.match(/^"[^"]*"/)) return 'string';
    if (stream.match(/^\d+(\.\d+)?/)) return 'number';
    if (stream.match(/^\/api\/[a-zA-Z0-9_/:.-]*/)) return 'string';
    if (stream.match(/^\/[a-z][a-zA-Z0-9_/-]*/)) return 'string';
    if (stream.match(/^[=+\-*/<>!]+/)) return 'operator';
    if (stream.match(/^[a-zA-Z_][a-zA-Z0-9_]*/)) {
      const w = stream.current();
      if (clearKeywords.has(w)) return 'keyword';
      if (w === w.toUpperCase() && w.length > 1) return 'typeName';
      return 'variableName';
    }
    stream.next();
    return null;
  },
});

// Highlight styles are rebuilt on theme change
function makeHighlightStyle() {
  const s = getComputedStyle(document.documentElement);
  return HighlightStyle.define([
    { tag: tags.keyword, color: s.getPropertyValue('--kw-color').trim(), fontWeight: '500' },
    { tag: tags.string, color: s.getPropertyValue('--str-color').trim() },
    { tag: tags.number, color: s.getPropertyValue('--num-color').trim() },
    { tag: tags.comment, color: s.getPropertyValue('--cmt-color').trim(), fontStyle: 'italic' },
    { tag: tags.operator, color: s.getPropertyValue('--op-color').trim() },
    { tag: tags.variableName, color: s.getPropertyValue('--var-color').trim() },
    { tag: tags.typeName, color: s.getPropertyValue('--type-color').trim() },
  ]);
}
let clearHighlight = makeHighlightStyle();

// ==========================================================================
// EDITOR
// ==========================================================================
let compileTimer = null;
let suppressAutoCompile = false;
let lastCompiled = null;

const editor = new EditorView({
  doc: `# Welcome to Clear Playground
# Pick a template from the dropdown, or start typing.

show 'Hello, Clear!'
`,
  extensions: [
    lineNumbers(),
    highlightActiveLineGutter(),
    highlightActiveLine(),
    drawSelection(),
    history(),
    clearLang,
    syntaxHighlighting(clearHighlight),
    keymap.of([...defaultKeymap, ...historyKeymap, indentWithTab]),
    EditorView.updateListener.of(update => {
      if (update.docChanged && !suppressAutoCompile) {
        clearTimeout(compileTimer);
        compileTimer = setTimeout(() => autoCompile(), 500);
      }
      if (update.docChanged) updateEditorTOC(update.state.doc.toString());
      // Show/hide Quote button based on selection
      if (update.selectionSet || update.docChanged) {
        const sel = update.state.selection.main;
        const hasSelection = sel.from !== sel.to;
        const qBtn = document.getElementById('quote-btn');
        if (qBtn) qBtn.style.display = hasSelection ? '' : 'none';
      }
      // Update status bar cursor position
      const pos = update.state.selection.main.head;
      const line = update.state.doc.lineAt(pos);
      const col = pos - line.from + 1;
      const linesEl = document.getElementById('sb-lines');
      const cursorEl = document.getElementById('sb-cursor');
      if (linesEl) linesEl.textContent = 'Lines: ' + update.state.doc.lines;
      if (cursorEl) cursorEl.textContent = 'Ln ' + line.number + ', Col ' + col;
    }),
    EditorView.theme({
      '&': { height: '100%' },
      '.cm-scroller': { overflow: 'auto' },
    }),
  ],
  parent: document.getElementById('editor-mount'),
});

window._editor = editor;      // For chat apply
window._editorView = editor;  // For tests

// ==========================================================================
// EDITOR TOC
// ==========================================================================
function updateEditorTOC(source) {
  const tocEl = document.getElementById('editor-toc');
  if (!tocEl) return;
  const lines = source.split('\n');
  const sections = [];
  lines.forEach((line, idx) => {
    const m = line.match(/^(#{1,2})\s+(.+)/);
    if (!m) return;
    // Strip decorative dashes: "--- Section ---" → "Section"
    let label = m[2].trim().replace(/^-+\s*/, '').replace(/\s*-+$/, '').trim();
    if (!label) return; // skip blank after stripping
    // Truncate long labels
    if (label.length > 28) label = label.slice(0, 26) + '…';
    sections.push({ level: m[1].length, label, lineNum: idx + 1 });
  });
  if (!sections.length) { tocEl.innerHTML = ''; return; }
  tocEl.innerHTML =
    `<span style="font-size:10px;color:var(--tx4);font-family:var(--font);text-transform:uppercase;letter-spacing:.06em;padding-right:4px;flex-shrink:0">Jump to</span>` +
    sections.map(s =>
      `<button class="toc-btn${s.level === 2 ? ' toc-sub' : ''}" onclick="jumpToLine(${s.lineNum})" title="Jump to line ${s.lineNum}: ${escHtml(s.label)}">⌗ ${escHtml(s.label)}</button>`
    ).join('');
}

// Populate TOC on initial load
updateEditorTOC(editor.state.doc.toString());

// ==========================================================================
// COMPILE
// ==========================================================================
async function runScanAnimation(source) {
  const lines = source.split('\n');
  const msPerLine = Math.max(40, Math.min(80, 2400 / Math.max(lines.length, 1)));
  const totalMs = lines.length * msPerLine;
  showTab('compiled');
  const el = document.getElementById('preview-content');
  el.innerHTML = '<pre>' + lines.map((l, i) =>
    `<span class="cl" id="scan-${i}"><span class="cl-code">${escHtml(l)}</span></span>`
  ).join('\n') + '</pre>';
  for (let i = 0; i < lines.length; i++) {
    const span = document.getElementById('scan-' + i);
    if (span) span.classList.add('cm-scan-line');
    await new Promise(r => setTimeout(r, msPerLine));
  }
}

async function autoCompile() {
  const source = editor.state.doc.toString();
  setStatus('compiling', 'Compiling...');
  runScanAnimation(source); // fire-and-forget; real result replaces it when done
  const t0 = performance.now();
  try {
    const r = await fetch('/api/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source }),
    });
    const elapsed = Math.round(performance.now() - t0);
    lastCompiled = await r.json();
    showErrors(lastCompiled.errors, lastCompiled.warnings);
    // Update compile dot
    const dot = document.getElementById('compile-dot');
    if (lastCompiled.errors.length === 0) {
      if (dot) dot.className = 'dot';
      setStatus('ok', `OK${lastCompiled.warnings?.length ? ` (${lastCompiled.warnings.length} warnings)` : ''}`);
      // Show compile stats
      const clearLines = source.split('\n').filter(l => l.trim()).length;
      const outCode = [lastCompiled.html, lastCompiled.serverJS, lastCompiled.javascript, lastCompiled.python].filter(Boolean).join('\n');
      const codeLines = outCode.split('\n').filter(l => l.trim()).length;
      const statsEl = document.getElementById('sb-compile-stats');
      if (statsEl) { statsEl.textContent = `${clearLines} → ${codeLines} lines · ${elapsed}ms`; statsEl.style.display = ''; }
      // Update target info in status bar
      const target = lastCompiled.html ? (lastCompiled.serverJS ? 'web + backend' : 'web') : (lastCompiled.python ? 'python' : lastCompiled.javascript ? 'backend' : 'script');
      const tEl = document.getElementById('sb-target');
      if (tEl) tEl.textContent = target;
      // Show Run/Stop now that we have a compiled result
      document.getElementById('run-btn').style.display = '';
      document.getElementById('stop-btn').style.display = '';
      // Show/hide contextual tabs and meta chips
      const srcInfo = parseSourceInfo();
      document.getElementById('data-tab-btn').style.display = srcInfo.tables.length > 0 ? '' : 'none';
      document.getElementById('api-tab-btn').style.display = srcInfo.endpoints.length > 0 ? '' : 'none';
      document.getElementById('download-btn').style.display = lastCompiled.html ? '' : 'none';
      showMetaChips();
      if (activeTab === 'output') showOutput();
      if (activeTab === 'compiled') showCompiled();
    } else {
      if (dot) dot.className = 'dot err';
      setStatus('err', `${lastCompiled.errors.length} error${lastCompiled.errors.length > 1 ? 's' : ''}`);
    }
  } catch (err) {
    setStatus('err', 'Compile failed');
  }
}
window.doCompile = autoCompile;

// ==========================================================================
// PREVIEW
// ==========================================================================
let activeTab = 'compiled';

function showOutput() {
  const el = document.getElementById('preview-content');
  if (!lastCompiled) return;
  if (lastCompiled.html) {
    let html = lastCompiled.html;
    if (lastCompiled.browserServer) {
      html = html.replace('</head>', '<script>' + lastCompiled.browserServer + '<\/script></head>');
    }
    // Inject console error/warn capture so Claude can read frontend errors
    const errorCapture = `<script>
(function(){
  var _post = function(type, args) {
    try { fetch('http://localhost:3456/api/frontend-log', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type: type, message: Array.from(args).join(' ') }) }); } catch(e){}
  };
  var _err = console.error.bind(console);
  var _warn = console.warn.bind(console);
  console.error = function(){ _err.apply(console, arguments); _post('error', arguments); };
  console.warn  = function(){ _warn.apply(console, arguments);  _post('warn',  arguments); };
  window.onerror = function(msg, src, line){ _post('onerror', [msg + ' (' + src + ':' + line + ')']); };
  window.onunhandledrejection = function(e){ _post('unhandledrejection', [e.reason]); };
})();
<\/script>`;
    html = html.replace('</head>', errorCapture + '</head>');
    el.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin"></iframe>';
    el.querySelector('iframe').srcdoc = html;
  } else if (lastCompiled.serverJS || lastCompiled.javascript) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#9881;</div><div class="title">Backend app</div><div class="hint">Click <kbd>Run</kbd> to start the server, then check the Terminal tab.</div></div>';
  } else if (lastCompiled.python) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#9881;</div><div class="title">Python app</div><div class="hint">Click <kbd>Run</kbd> to start the server, then check the Terminal tab.</div></div>';
  } else {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#9654;</div><div class="title">No output</div><div class="hint">No renderable output.</div></div>';
  }
}

function showCompiled() {
  const el = document.getElementById('preview-content');
  if (!lastCompiled) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#9654;</div><div class="title">Press Compile to see compiled code</div><div class="hint">Ctrl+S or the Compile button</div></div>';
    return;
  }
  const parts = [];
  if (lastCompiled.html) parts.push('<!-- HTML -->\n' + lastCompiled.html);
  if (lastCompiled.serverJS) parts.push('// Server JS\n' + lastCompiled.serverJS);
  if (lastCompiled.javascript) parts.push('// JavaScript\n' + lastCompiled.javascript);
  if (lastCompiled.python) parts.push('# Python\n' + lastCompiled.python);
  const text = parts.join('\n\n');
  const lineHtml = text.split('\n').map(line =>
    `<span class="cl"><span class="cl-code">${escHtml(line)}</span></span>`
  ).join('\n');
  el.innerHTML = '<pre>' + lineHtml + '</pre>';
}

function showTerminal() {
  const el = document.getElementById('preview-content');
  el.innerHTML = '<div id="terminal">' + terminalLog + '</div>';
}

let terminalLog = '<span class="term-out" style="color:var(--tx3)">Terminal ready. Click Run to start an app.</span>\n';

function appendTerminal(html) {
  terminalLog += html;
  if (activeTab === 'terminal') {
    const el = document.getElementById('terminal');
    if (el) { el.innerHTML = terminalLog; el.scrollTop = el.scrollHeight; }
  }
}

window.showTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll('.prev-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.prev-tab[onclick*="${tab}"]`).classList.add('active');
  if (tab === 'output') showOutput();
  else if (tab === 'compiled') showCompiled();
  else if (tab === 'terminal') showTerminal();
  else if (tab === 'data') showData();
  else if (tab === 'api') showApiTab();
};

// ==========================================================================
// SOURCE PARSER — extract tables, endpoints, agents from Clear source
// ==========================================================================
function parseSourceInfo(source) {
  const lines = (source || editor.state.doc.toString()).split('\n');
  const tables = [], endpoints = [], agents = [];
  let hasAuth = false;
  for (const line of lines) {
    const tbl = line.match(/^create\s+(?:a\s+)?(\w+)\s+table/i);
    if (tbl) tables.push(tbl[1]);
    const ep = line.match(/^when\s+user\s+calls\s+(GET|POST|PUT|DELETE)\s+(\S+)/i);
    if (ep) {
      const hasBody = /sending\s+\w+/.test(line);
      const hasId = ep[2].includes(':id');
      endpoints.push({ method: ep[1].toUpperCase(), path: ep[2], hasBody, hasId });
    }
    const ag = line.match(/^agent\s+'([^']+)'/i);
    if (ag) agents.push(ag[1]);
    if (/requires\s+auth/i.test(line)) hasAuth = true;
  }
  return { tables, endpoints, agents, hasAuth };
}

function getTableNames() {
  return parseSourceInfo().tables;
}

async function fetchTableData(tableName) {
  const r = await fetch('/api/fetch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: 'GET', path: '/api/' + tableName.toLowerCase() }),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return Array.isArray(d.data) ? d.data : [];
}

window.deleteDataRow = async function(tableName, id) {
  await fetch('/api/fetch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: 'DELETE', path: '/api/' + tableName.toLowerCase() + '/' + id }),
  });
  showData();
};

window.refreshTable = function(tableName) {
  showData();
};

async function showData() {
  const el = document.getElementById('preview-content');

  // Check if app is running
  let status;
  try { status = await (await fetch('/api/app-status')).json(); } catch { status = { running: false }; }

  if (!status.running) {
    el.innerHTML = '<div class="data-no-app"><div class="icon">⚡</div><div>Run your app first to see live data</div></div>';
    return;
  }

  const tables = getTableNames();
  if (tables.length === 0) {
    el.innerHTML = '<div class="data-no-app"><div class="icon">🗄️</div><div>No tables defined in this app</div></div>';
    return;
  }

  el.innerHTML = '<div id="data-panel"><div style="color:var(--tx3);font-size:12px">Loading...</div></div>';
  const panel = document.getElementById('data-panel');
  panel.innerHTML = '';

  for (const tableName of tables) {
    const block = document.createElement('div');
    block.className = 'data-table-block';

    let rows = [];
    let err = null;
    try { rows = await fetchTableData(tableName); }
    catch (e) { err = e.message; }

    const cols = rows.length > 0 ? Object.keys(rows[0]).filter(k => k !== '__v') : [];
    const hasId = cols.includes('id') || cols.includes('_id');

    block.innerHTML = `
      <div class="data-table-header">
        <span class="data-table-name">${escHtml(tableName)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="data-table-count">${rows.length} row${rows.length !== 1 ? 's' : ''}</span>
          <button class="data-refresh-btn" onclick="refreshTable('${escHtml(tableName)}')">↻ Refresh</button>
        </span>
      </div>
      ${err ? `<div class="data-empty" style="color:var(--red)">${escHtml(err)}</div>` :
        rows.length === 0 ? '<div class="data-empty">No records yet</div>' :
        `<table class="data-grid">
          <thead><tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join('')}<th></th></tr></thead>
          <tbody>${rows.map(row => {
            const rowId = row.id || row._id || '';
            return `<tr>${cols.map(c => `<td title="${escHtml(String(row[c] ?? ''))}">${escHtml(String(row[c] ?? ''))}</td>`).join('')}
              <td>${rowId ? `<button class="data-del-btn" onclick="deleteDataRow('${escHtml(tableName)}','${escHtml(String(rowId))}')" title="Delete">✕</button>` : ''}</td></tr>`;
          }).join('')}</tbody>
        </table>`
      }`;
    panel.appendChild(block);
  }
}

window.toggleEpBody = function(idx) {
  const body = document.getElementById(`ep-body-${idx}`);
  if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
};

window.sendApiRequest = async function(idx, method, pathTemplate) {
  const statusEl = document.getElementById(`ep-status-${idx}`);
  const respEl = document.getElementById(`ep-response-${idx}`);
  statusEl.textContent = 'Sending...';
  statusEl.className = '';
  respEl.style.display = 'none';

  // Build path (replace :id if needed)
  let path = pathTemplate;
  const idEl = document.getElementById(`ep-id-${idx}`);
  if (idEl) path = path.replace(':id', encodeURIComponent(idEl.value || '1'));

  // Build body
  let body = undefined;
  const bodyEl = document.getElementById(`ep-body-json-${idx}`);
  if (bodyEl && bodyEl.value.trim()) {
    try { body = JSON.parse(bodyEl.value); }
    catch { statusEl.textContent = 'Invalid JSON body'; statusEl.className = 'ep-status-err'; return; }
  }

  try {
    const r = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method, path, body }),
    });
    const d = await r.json();
    if (d.error) {
      statusEl.textContent = d.error;
      statusEl.className = 'ep-status-err';
    } else {
      statusEl.innerHTML = `<span class="${d.status < 300 ? 'ep-status-ok' : 'ep-status-err'}">${d.status}</span>`;
      respEl.textContent = typeof d.data === 'string' ? d.data : JSON.stringify(d.data, null, 2);
      respEl.style.display = '';
    }
  } catch (err) {
    statusEl.textContent = 'No app running — click Run first';
    statusEl.className = 'ep-status-err';
  }
};

// ==========================================================================
// RUN
// ==========================================================================
window.doRun = async function() {
  // Determine what backend code we have — full-stack puts it in serverJS,
  // backend-only (no HTML) puts it in javascript
  const backendCode = lastCompiled?.serverJS || (!lastCompiled?.html && lastCompiled?.javascript) || null;
  // Web-only app: just show the rendered output, no server needed
  if (lastCompiled?.html && !backendCode) {
    showTab('output');
    return;
  }
  if (!lastCompiled || !backendCode) {
    appendTerminal('<span class="term-err">Compile first.</span>\n');
    showTab('terminal');
    return;
  }
  setStatus('compiling', 'Starting...');
  appendTerminal('<span class="term-cmd">$ node server.js</span>\n');
  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ serverJS: backendCode, html: lastCompiled.html, css: lastCompiled.css }),
    });
    const data = await r.json();
    if (data.error) {
      appendTerminal('<span class="term-err">' + escHtml(data.error) + '</span>\n');
      setStatus('err', 'Run failed');
      showTab('terminal');
    } else {
      appendTerminal('<span class="term-out">Server running on port ' + data.port + '</span>\n');
      if (data.logs) data.logs.forEach(l => appendTerminal('<span class="term-out">' + escHtml(l) + '</span>'));
      setStatus('ok', 'Running :' + data.port);
      // If app has tables, show Data tab; if HTML, show output; else terminal
      if (getTableNames().length > 0) showTab('data');
      else if (lastCompiled.html) showTab('output');
      else showTab('terminal');
    }
  } catch (err) {
    appendTerminal('<span class="term-err">' + escHtml(err.message) + '</span>\n');
    setStatus('err', 'Run failed');
    showTab('terminal');
  }
};

window.doStop = async function() {

function showErrors(errors, warnings) {
  const el = document.getElementById('errors');
  if (!errors.length && (!warnings || !warnings.length)) { el.innerHTML = ''; return; }
  let html = '';
  errors.forEach(e => {
    html += `<div class="error-line" onclick="jumpToLine(${e.line || 1})">Line ${e.line || '?'}: ${escHtml(e.message)}</div>`;
  });
  (warnings || []).forEach(w => {
    const msg = typeof w === 'string' ? w : w.message || '';
    const line = typeof w === 'object' ? (w.line || 0) : 0;
    html += `<div class="warning-line" style="cursor:pointer" onclick="jumpToLine(${line || 1})">${escHtml(msg)}</div>`;
  });
  el.innerHTML = html;
}

window.jumpToLine = function(line) {
  const lineObj = editor.state.doc.line(Math.min(line, editor.state.doc.lines));
  editor.dispatch({ selection: { anchor: lineObj.from }, scrollIntoView: true });
  editor.focus();
  // Flash highlight the line using a decoration
  const lineEl = editor.domAtPos(lineObj.from)?.node;
  // Walk up to find the cm-line div
  let el = lineEl instanceof Element ? lineEl : lineEl?.parentElement;
  while (el && !el.classList.contains('cm-line')) el = el.parentElement;
  if (el) {
    el.classList.remove('cm-jump-line');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('cm-jump-line');
    setTimeout(() => el.classList.remove('cm-jump-line'), 950);
  }
};

// ==========================================================================
// MARKDOWN RENDERER
// ==========================================================================
function markdownToHtml(text) {
  // Escape helper for non-code content
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Split out fenced code blocks first
  const parts = [];
  const codeRe = /```(\w*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = codeRe.exec(text)) !== null) {
    if (m.index > last) parts.push({ type: 'text', s: text.slice(last, m.index) });
    parts.push({ type: 'code', lang: m[1], s: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type: 'text', s: text.slice(last) });

  function renderInline(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  function renderText(s) {
    const lines = s.split('\n');
    let out = '';
    let inList = false;
    for (const line of lines) {
      if (/^#{1,3} (.+)/.test(line)) {
        if (inList) { out += '</ul>'; inList = false; }
        const lvl = line.match(/^(#+)/)[1].length;
        out += `<h${lvl + 2} style="margin:.5em 0 .2em;font-size:${14 - lvl}px;font-weight:600">${renderInline(line.replace(/^#+\s+/, ''))}</h${lvl + 2}>`;
      } else if (/^[-*] (.+)/.test(line)) {
        if (!inList) { out += '<ul style="margin:.3em 0 .3em 1.2em;padding:0">'; inList = true; }
        out += `<li>${renderInline(line.replace(/^[-*] /, ''))}</li>`;
      } else if (line.trim() === '') {
        if (inList) { out += '</ul>'; inList = false; }
        out += '<br>';
      } else {
        if (inList) { out += '</ul>'; inList = false; }
        out += `<span>${renderInline(line)}</span><br>`;
      }
    }
    if (inList) out += '</ul>';
    return out;
  }

  return parts.map(p => {
    if (p.type === 'code') {
      return `<pre>${esc(p.s)}<button class="apply-btn" onclick="applyCode(this)">Apply</button></pre>`;
    }
    return renderText(p.s);
  }).join('');
}

function addChatMsg(role, content, toolSteps) {
  chatMessages.push({ role, content, toolSteps: toolSteps || [] });
  renderChat();
}

function renderMsgInner(m) {
  let html = '';
  if (m.toolSteps && m.toolSteps.length) {
    html += m.toolSteps.map(t => `<div class="tool-step">${escHtml(t)}</div>`).join('');
  }
  if (m.role === 'assistant') {
    if (m.streaming && !m.content && !m.toolSteps?.length) {
      // No text yet — show animated dots instead of empty bubble
      html += '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    } else {
      html += markdownToHtml(m.content || '');
      if (m.streaming) html += '<span class="stream-cursor">▌</span>';
    }
  } else {
    html += escHtml(m.content || '').replace(/\n/g, '<br>');
  }
  return html;
}

function renderMsgHtml(m) {
  const cls = m.role === 'user' ? 'user' : 'assistant';
  return `<div class="msg ${cls}" data-idx="${m._idx}">${renderMsgInner(m)}</div>`;
}

function renderChat() {
  const el = document.getElementById('chat-messages');
  const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 40;
  el.innerHTML = chatMessages.filter(m => m.role !== 'system').map((m, i) => {
    m._idx = i;
    return renderMsgHtml(m);
  }).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function updateLastMsg() {
  const el = document.getElementById('chat-messages');
  const m = chatMessages[chatMessages.length - 1];
  if (!m) return;
  const div = el.querySelector(`[data-idx="${m._idx}"]`);
  if (div) {
    // Use innerHTML (not outerHTML) so the element stays in the DOM — prevents blink on each delta
    div.innerHTML = renderMsgInner(m);
    el.scrollTop = el.scrollHeight;
  } else {
    renderChat();
  }
}

window.applyCode = function(btn) {
  const code = btn.parentElement.textContent.replace('Apply', '').trim();
  editor.dispatch({
    changes: { from: 0, to: editor.state.doc.length, insert: code },
  });
  autoCompile();
};

// IMAGE PASTE SUPPORT
// ==========================================================================
let pendingImages = []; // Array of { dataUrl, mediaType }

document.getElementById('chat-input').addEventListener('paste', e => {
  const items = Array.from(e.clipboardData?.items || []);
  const imgItems = items.filter(i => i.type.startsWith('image/'));
  if (!imgItems.length) return;
  e.preventDefault();
  imgItems.forEach(item => {
    const file = item.getAsFile();
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      const mediaType = file.type;
      pendingImages.push({ dataUrl, mediaType });
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  });
});

function renderImagePreviews() {
  let bar = document.getElementById('img-preview-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'img-preview-bar';
    bar.style.cssText = 'display:flex;gap:6px;padding:4px 8px;flex-wrap:wrap;border-top:1px solid var(--bd)';
    document.getElementById('chat-input-area').prepend(bar);
  }
  bar.innerHTML = pendingImages.map((img, i) =>
    `<div style="position:relative;display:inline-block">
      <img src="${img.dataUrl}" style="height:48px;border-radius:4px;border:1px solid var(--bd2)">
      <button onclick="removeImage(${i})" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:1">✕</button>
    </div>`
  ).join('');
}

window.removeImage = function(i) {
  pendingImages.splice(i, 1);
  renderImagePreviews();
};

// ==========================================================================
// SEND CHAT (streaming)
// ==========================================================================
window.sendChat = async function() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg && !pendingImages.length) return;
  input.value = '';

  if (!apiKey && !serverHasKey) { showKeySetup(); return; }

  // Build user message content (text + images)
  let userContent;
  if (pendingImages.length) {
    userContent = [
      ...pendingImages.map(img => ({
        type: 'image',
        source: { type: 'base64', media_type: img.mediaType, data: img.dataUrl.split(',')[1] },
      })),
      { type: 'text', text: msg || 'What do you see?' },
    ];
    pendingImages = [];
    const bar = document.getElementById('img-preview-bar');
    if (bar) bar.remove();
  } else {
    userContent = msg;
  }

  chatMessages.push({ role: 'user', content: userContent, _idx: chatMessages.length });
  renderChat();
  document.getElementById('chat-send').disabled = true;

  // Create streaming assistant message
  const aIdx = chatMessages.length;
  chatMessages.push({ role: 'assistant', content: '', toolSteps: [], streaming: true, _idx: aIdx });
  renderChat();

  try {
    const apiMessages = chatMessages.slice(0, -1).filter(m => m.role !== 'system').map(m => ({
      role: m.role,
      content: m.content,
    }));

    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        apiKey,
        editorContent: editor.state.doc.toString(),
        errors: lastCompiled?.errors || [],
        webTools: document.getElementById('web-tools-toggle')?.checked || false,
      }),
    });

    if (!r.ok) {
      const errText = await r.text();
      let msg;
      try { msg = JSON.parse(errText).error; } catch { msg = errText; }
      const am = chatMessages[aIdx];
      am.content = 'Server error: ' + (msg || r.status);
      am.streaming = false;
      updateLastMsg();
      document.getElementById('chat-send').disabled = false;
      return;
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        const am = chatMessages[aIdx];
        if (ev.type === 'text') {
          am.content += ev.delta;
          updateLastMsg();
        } else if (ev.type === 'tool_start') {
          if (!am.toolSteps.includes(ev.name)) am.toolSteps.push(ev.name);
          updateLastMsg();
        } else if (ev.type === 'code_update') {
          suppressAutoCompile = true;
          editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: ev.code } });
          suppressAutoCompile = false;
          autoCompile();
        } else if (ev.type === 'highlight') {
          highlightEditorLines(ev.startLine, ev.endLine, ev.message);
        } else if (ev.type === 'switch_tab') {
          showTab(ev.tab);
        } else if (ev.type === 'terminal_append') {
          appendTerminal(`<span class="term-cmd">${escHtml(ev.text)}</span>\n`);
          if (activeTab !== 'terminal') showToast(ev.text.slice(0, 60));
        } else if (ev.type === 'screenshot_request') {
          captureOutputScreenshot();
        } else if (ev.type === 'done') {
          am.streaming = false;
          updateLastMsg();
        } else if (ev.type === 'error') {
          am.content += (am.content ? '\n\n' : '') + 'Error: ' + ev.message;
          am.streaming = false;
          updateLastMsg();
        }
      }
    }
  } catch (err) {
    const am = chatMessages[aIdx];
    am.content = 'Connection error: ' + err.message;
    am.streaming = false;
    updateLastMsg();
  }

  chatMessages[aIdx].streaming = false;
  updateLastMsg();
  document.getElementById('chat-send').disabled = false;
};

// Enter to send (Shift+Enter for newline)
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// ==========================================================================
// QUOTE SELECTION IN CHAT (Ctrl+Shift+C)
// ==========================================================================
window.quoteSelectionInChat = function() {
  const sel = editor.state.sliceDoc(
    editor.state.selection.main.from,
    editor.state.selection.main.to,
  );
  if (!sel.trim()) return;
  const input = document.getElementById('chat-input');
  input.value = (input.value ? input.value + '\n' : '') + '```\n' + sel + '\n```\n';
  input.focus();
  showToast('Selection quoted in chat');
};

// ==========================================================================
// SCREENSHOT CAPTURE — triggered by Claude's screenshot_output tool
// ==========================================================================
async function captureOutputScreenshot() {
  try {
    const target = document.getElementById('preview-content');
    if (!target) { await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) }); return; }

    // Use html2canvas if available
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas(target, {
        useCORS: true,
        allowTaint: false,
        backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#fff',
        scale: 1,
        logging: false,
      });
      const base64 = canvas.toDataURL('image/png').split(',')[1];
      await fetch('/api/screenshot-data', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image: base64 }),
      });
    } else {
      await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) });
    }
  } catch (err) {
    await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) }).catch(() => {});
  }
}

// ==========================================================================
// CLAUDE HIGHLIGHT — lets Claude point at lines in the editor
// ==========================================================================
window.highlightEditorLines = function(startLine, endLine, msg) {
  // Jump to the start line
  jumpToLine(startLine);
  // Flash all lines in range
  for (let ln = startLine; ln <= (endLine || startLine); ln++) {
    if (ln > editor.state.doc.lines) break;
    const lineObj = editor.state.doc.line(ln);
    const node = editor.domAtPos(lineObj.from)?.node;
    let el = node instanceof Element ? node : node?.parentElement;
    while (el && !el.classList.contains('cm-line')) el = el?.parentElement;
    if (el) {
      el.classList.remove('cm-claude-line');
      void el.offsetWidth;
      el.classList.add('cm-claude-line');
      setTimeout(() => el?.classList.remove('cm-claude-line'), 2000);
    }
  }
  if (msg) showToast('Claude: ' + msg);
};

// ==========================================================================
// LOAD FILE FROM DISK
// ==========================================================================
document.getElementById('load-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    suppressAutoCompile = true;
    editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: ev.target.result } });
    suppressAutoCompile = false;
    document.getElementById('editor-label').textContent = file.name;
    document.getElementById('template-picker').value = '';
    lastCompiled = null;
    showToast('Loaded ' + file.name);
  };
  reader.readAsText(file);
  e.target.value = ''; // reset so same file can be re-loaded
});

// ==========================================================================
// TEMPLATES
// ==========================================================================
window.newFile = function() {
  editor.dispatch({
    changes: { from: 0, to: editor.state.doc.length, insert: `build for web and javascript backend
database is local memory

# Your app here

` },
  });
  document.getElementById('editor-label').textContent = 'main.clear';
  document.getElementById('template-picker').value = '';
  autoCompile();
};

async function loadTemplates() {
  try {
    const r = await fetch('/api/templates');
    const templates = await r.json();
    const sel = document.getElementById('template-picker');
    if (templates.length === 0) {
      const opt = document.createElement('option');
      opt.disabled = true;
      opt.textContent = 'No templates found in apps/';
      sel.appendChild(opt);
      return;
    }
    templates.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.name;
      opt.textContent = t.name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      sel.appendChild(opt);
    });
  } catch (err) {
    console.error('Failed to load templates:', err);
  }
}

document.getElementById('template-picker').addEventListener('change', async function() {
  if (!this.value) return;
  try {
    const r = await fetch('/api/template/' + this.value);
    const source = await r.text();
    suppressAutoCompile = true;
    editor.dispatch({
      changes: { from: 0, to: editor.state.doc.length, insert: source },
    });
    suppressAutoCompile = false;
    clearTimeout(compileTimer);
    // Update editor header with template name
    const label = document.getElementById('editor-label');
    if (label) label.textContent = this.value + '/main.clear';
    // Reset preview to empty state — user must explicitly compile
    lastCompiled = null;
    showTab('compiled');
  } catch {}
});

// ==========================================================================
// KEYBOARD SHORTCUTS
// ==========================================================================
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); autoCompile(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); doRun(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('chat-input').focus(); }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'C') { e.preventDefault(); quoteSelectionInChat(); }
});

// ==========================================================================
// HELPERS
// ==========================================================================
function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ==========================================================================
// DOWNLOAD — save compiled HTML to disk
// ==========================================================================
window.doDownload = function() {
  if (!lastCompiled?.html) return;
  const blob = new Blob([lastCompiled.html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('template-picker').value || 'app') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
};

// ==========================================================================
// SAVE
// ==========================================================================
window.doSave = async function() {
  const source = editor.state.doc.toString();
  const templateName = document.getElementById('template-picker').value || 'my-app';
  try {
    const r = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, filename: templateName, compiled: lastCompiled }),
    });
    const data = await r.json();
    if (data.saved) {
      showToast('Saved to ' + data.path);
    } else {
      showToast('Save failed: ' + (data.error || 'unknown'));
    }
  } catch (err) {
    showToast('Save failed: ' + err.message);
  }
};

// ==========================================================================
// CHAT PANEL COLLAPSE
// ==========================================================================
// ==========================================================================
// DOCS VIEWER
// ==========================================================================
let docsCache = {};
let docsRaw = '';

function mdToDocHtml(md) {
  const lines = md.split('\n');
  const out = [];
  let inCode = false, codeLang = '', codeBuf = [];
  for (const line of lines) {
    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeLang = line.slice(3).trim(); codeBuf = []; continue; }
      out.push(`<pre class="doc-code"><code>${escHtml(codeBuf.join('\n'))}</code></pre>`);
      inCode = false; codeBuf = []; continue;
    }
    if (inCode) { codeBuf.push(line); continue; }
    if (line.startsWith('# '))  { out.push(`<h1 class="doc-h1">${escHtml(line.slice(2))}</h1>`); continue; }
    if (line.startsWith('## ')) { out.push(`<h2 class="doc-h2">${escHtml(line.slice(3))}</h2>`); continue; }
    if (line.startsWith('### ')){ out.push(`<h3 class="doc-h3">${escHtml(line.slice(4))}</h3>`); continue; }
    if (line.startsWith('- ') || line.startsWith('* ')) { out.push(`<li>${escHtml(line.slice(2))}</li>`); continue; }
    if (line.trim() === '') { out.push('<div class="doc-gap"></div>'); continue; }
    // Inline: **bold**, `code`
    let l = escHtml(line)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code class="doc-inline">$1</code>');
    out.push(`<p class="doc-p">${l}</p>`);
  }
  return out.join('');
}

function filterDocs(query) {
  if (!docsRaw) return;
  const el = document.getElementById('docs-content');
  if (!query.trim()) { el.innerHTML = mdToDocHtml(docsRaw); return; }
  const q = query.toLowerCase();
  const sections = docsRaw.split(/^(?=#{1,2} )/m);
  const matched = sections.filter(s => s.toLowerCase().includes(q));
  el.innerHTML = matched.length ? mdToDocHtml(matched.join('\n')) : '<p style="color:var(--tx3);padding:16px 0">No results.</p>';
}

window.openDocs = async function(which) {
  const overlay = document.getElementById('docs-overlay');
  const content = document.getElementById('docs-content');
  const search = document.getElementById('docs-search');
  overlay.style.display = '';
  document.getElementById('docs-tab-syntax').style.fontWeight = which === 'syntax' ? '700' : '';
  document.getElementById('docs-tab-guide').style.fontWeight = which === 'user-guide' ? '700' : '';
  if (search) search.value = '';
  content.innerHTML = '<p style="color:var(--tx3);padding:16px 0">Loading…</p>';
  if (docsCache[which]) {
    docsRaw = docsCache[which];
    content.innerHTML = mdToDocHtml(docsRaw);
    return;
  }
  try {
    const r = await fetch(`/api/docs/${which}`);
    if (!r.ok) throw new Error('Not found');
    docsRaw = await r.text();
    docsCache[which] = docsRaw;
    content.innerHTML = mdToDocHtml(docsRaw);
  } catch (e) {
    content.innerHTML = `<p style="color:var(--red)">Could not load docs: ${e.message}</p>`;
  }
};

window.closeDocs = function() {
  document.getElementById('docs-overlay').style.display = 'none';
};

// Close docs on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDocs();
});

window.toggleChat = function() {
  const pane = document.getElementById('chat-pane');
  const btn = document.getElementById('chat-toggle-btn');
  const collapsed = pane.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Show Chat ▶' : 'Hide Chat ◀';
  btn.title = collapsed ? 'Show Claude panel' : 'Hide Claude panel';
};

// ==========================================================================
// EDITOR / PREVIEW DRAG RESIZER
// ==========================================================================
(function() {
  const resizer = document.getElementById('ep-resizer');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');
  let dragging = false, startX = 0, startEditorW = 0, startPreviewW = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startEditorW = editorPane.getBoundingClientRect().width;
    startPreviewW = previewPane.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newEditorW = Math.max(200, startEditorW + dx);
    const newPreviewW = Math.max(200, startPreviewW - dx);
    // Use flex-grow ratios so window resize stays proportional
    const total = newEditorW + newPreviewW;
    editorPane.style.flex = `${newEditorW / total} 1 0`;
    previewPane.style.flex = `${newPreviewW / total} 1 0`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Boot
loadTemplates();
// Ready message is shown after /api/config resolves (see fetch above)
