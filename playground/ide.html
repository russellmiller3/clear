function renderMsgInner(m, isLast) {
  let html = '';
  if (m.role === 'assistant') {
    const hasAnything = (m.content || '') + (m.toolSteps?.length || 0) + (m.timeline?.length || 0);
    if (isLast && m.streaming && !hasAnything) {
      html += '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    } else if (m.timeline && m.timeline.length) {
      // Interleaved timeline rendering — tools inline with text
      let textBuf = '';
      for (let i = 0; i < m.timeline.length; i++) {
        const ev = m.timeline[i];
        if (ev.type === 'thinking') {
          // Flush text before thinking block
          if (textBuf) { html += markdownToHtml(textBuf); textBuf = ''; }
          html += `<details class="thinking-block"><summary><span class="think-icon">▶</span>Thinking</summary><div class="think-content">${escHtml(ev.text)}</div></details>`;
        } else if (ev.type === 'text') {
          textBuf += ev.text;
        } else if (ev.type === 'tool') {
          // Flush any accumulated text before the tool step
          if (textBuf) { html += markdownToHtml(textBuf); textBuf = ''; }
          const isLastTool = m.streaming && i === m.timeline.length - 1;
          const icon = (isLastTool && !ev.done) ? '◌' : '✓';
          const cls = (isLastTool && !ev.done) ? 'tool-step active' : 'tool-step';
          const label = ev.summary || ev.name;
          html += `<div class="${cls}"><span class="tool-icon">${icon}</span>${escHtml(label)}</div>`;
        }
      }
      // Flush remaining text
      if (textBuf) html += markdownToHtml(textBuf);
      if (isLast && m.streaming) html += '<span class="stream-cursor">▌</span>';
    } else {
      // Legacy: no timeline, just content + toolSteps at top
      if (m.toolSteps && m.toolSteps.length) {
        html += m.toolSteps.map((t, i) => {
          const active = m.streaming && i === m.toolSteps.length - 1;
          const icon = active ? '◌' : '✓';
          const cls = active ? 'tool-step active' : 'tool-step';
          const label = typeof t === 'object' ? t.summary : t;
          return `<div class="${cls}"><span class="tool-icon">${icon}</span>${escHtml(label)}</div>`;
        }).join('');
      }
      html += markdownToHtml(m.content || '');
      if (isLast && m.streaming) html += '<span class="stream-cursor">▌</span>';
    }
  } else {
    // Content can be a string or an array (when images are pasted)
    if (Array.isArray(m.content)) {
      for (const part of m.content) {
        if (part.type === 'image') {
          const src = part.source?.data ? `data:${part.source.media_type};base64,${part.source.data}` : '';
          html += `<img src="${src}" style="max-width:200px;border-radius:8px;margin:4px 0;">`;
        } else if (part.type === 'text') {
          html += escHtml(part.text || '').replace(/\n/g, '<br>');
        }
      }
    } else {
      html += escHtml(m.content || '').replace(/\n/g, '<br>');
    }
  }
  return html;
}

function renderMsgHtml(m, isLast) {
  const cls = m.role === 'user' ? 'user' : 'assistant';
  return `<div class="msg ${cls}" data-idx="${m._idx}">${renderMsgInner(m, isLast)}</div>`;
}

function renderChat(forceBottom) {
  if (showingKeySetup) return;
  const el = document.getElementById('chat-messages');
  const atBottom = forceBottom || el.scrollHeight - el.scrollTop <= el.clientHeight + 40;
  const visible = chatMessages.filter(m => m.role !== 'system');
  el.innerHTML = visible.map((m, i) => {
    m._idx = i;
    return renderMsgHtml(m, i === visible.length - 1);
  }).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
  updateScrollBtn();
}

window.scrollChatToBottom = function() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
  document.getElementById('chat-scroll-btn').style.display = 'none';
};

function updateScrollBtn() {
  const el = document.getElementById('chat-messages');
  const btn = document.getElementById('chat-scroll-btn');
  if (!btn || !el) return;
  const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 60;
  btn.style.display = atBottom ? 'none' : 'block';
}

document.getElementById('chat-messages').addEventListener('scroll', updateScrollBtn);

function updateLastMsg() {
  const el = document.getElementById('chat-messages');
  const m = chatMessages[chatMessages.length - 1];
  if (!m) return;
  const div = el.querySelector(`[data-idx="${m._idx}"]`);
  if (div) {
    // Use innerHTML (not outerHTML) so the element stays in the DOM — prevents blink on each delta
    div.innerHTML = renderMsgInner(m, true);
    el.scrollTop = el.scrollHeight;
  } else {
    renderChat();
  }
}

window.applyCode = function(btn) {
  // Replace: nuke entire editor and replace with this code
  const block = btn.closest('.code-block') || btn.parentElement;
  const pre = block.querySelector('pre');
  const code = pre ? pre.textContent.trim() : '';
  editor.dispatch({
    changes: { from: 0, to: editor.state.doc.length, insert: code },
  });
  autoCompile();
};

window.insertCode = function(btn) {
  // Insert: add at cursor position (or end if no selection)
  const block = btn.closest('.code-block') || btn.parentElement;
  const pre = block.querySelector('pre');
  const code = pre ? pre.textContent.trim() : '';
  const pos = editor.state.selection.main.head;
  // Add a newline before if cursor isn't at start of a line
  const line = editor.state.doc.lineAt(pos);
  const prefix = (pos > line.from) ? '\n' : '';
  editor.dispatch({
    changes: { from: pos, insert: prefix + code + '\n' },
    selection: { anchor: pos + prefix.length + code.length + 1 },
  });
  editor.focus();
  autoCompile();
};

window.copyCode = function(btn) {
  const block = btn.closest('.code-block') || btn.closest('.svg-diagram')?.parentElement;
  const pre = block?.querySelector('pre');
  const text = pre ? pre.textContent : '';
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1200);
  });
};

window.toggleHtmlPreview = function(btn) {
  const block = btn.closest('.code-block');
  const preview = block?.querySelector('.svg-diagram');
  if (!preview) return;
  const showing = preview.style.display !== 'none';
  preview.style.display = showing ? 'none' : '';
  btn.textContent = showing ? 'Preview' : 'Source';
};

window.expandSvg = function(el) {
  const svg = el.querySelector('svg');
  if (!svg) return;
  const overlay = document.createElement('div');
  overlay.className = 'svg-overlay';
  const inner = document.createElement('div');
  inner.className = 'svg-overlay-inner';
  const cloned = svg.cloneNode(true);
  cloned.removeAttribute('width');
  cloned.removeAttribute('height');
  cloned.style.width = '100%';
  cloned.style.height = 'auto';
  cloned.style.maxHeight = '80vh';
  inner.appendChild(cloned);
  const closeBtn = document.createElement('button');
  closeBtn.className = 'svg-overlay-close';
  closeBtn.textContent = 'Close';
  closeBtn.addEventListener('click', (e) => { e.stopPropagation(); overlay.remove(); });
  overlay.appendChild(closeBtn);
  overlay.appendChild(inner);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  const esc = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); } };
  document.addEventListener('keydown', esc);
};

// ==========================================================================
// SEND CHAT (streaming)
// ==========================================================================
let currentAbort = null;
window.stopChat = function() {
  if (currentAbort) currentAbort.abort();
};

window.sendChat = async function() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg && !pendingImages.length) return;
  input.value = '';

  if (!apiKey && !serverHasKey) { showKeySetup(); return; }

  // Build user message content (text + images)
  let userContent;
  if (pendingImages.length) {
    userContent = [
      ...pendingImages.map(img => ({
        type: 'image',
        source: { type: 'base64', media_type: img.mediaType, data: img.dataUrl.split(',')[1] },
      })),
      { type: 'text', text: msg || 'What do you see?' },
    ];
    pendingImages = [];
    const bar = document.getElementById('img-preview-bar');
    if (bar) bar.remove();
  } else {
    userContent = msg;
  }

  chatMessages.push({ role: 'user', content: userContent, _idx: chatMessages.length });
  renderChat();
  document.getElementById('chat-send').disabled = true;
  document.getElementById('chat-send').style.display = 'none';
  document.getElementById('chat-stop').style.display = '';

  // Create streaming assistant message
  const aIdx = chatMessages.length;
  chatMessages.push({ role: 'assistant', content: '', toolSteps: [], timeline: [], streaming: true, _idx: aIdx });
  renderChat();

  // AbortController for stop button
  currentAbort = new AbortController();

  try {
    const apiMessages = chatMessages.slice(0, -1).filter(m => m.role !== 'system').map(m => ({
      role: m.role,
      content: m.content,
    }));

    const chatBody = JSON.stringify({
      messages: apiMessages,
      apiKey,
      personality,
      editorContent: editor.state.doc.toString(),
      errors: lastCompiled?.errors || [],
      webTools: document.getElementById('web-tools-toggle')?.checked || false,
    });

    // Retry loop — 3 attempts with backoff for network/server errors
    let r;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: currentAbort.signal,
          body: chatBody,
        });
        if (r.ok) break;
        // Retry on server errors
        if (r.status >= 500 && attempt < 2) {
          const delay = (attempt + 1) * 2;
          const am = chatMessages[aIdx];
          am.content += `*Server error (${r.status}), retrying in ${delay}s...*\n`;
          updateLastMsg();
          await new Promise(ok => setTimeout(ok, delay * 1000));
          continue;
        }
        const errText = await r.text();
        let msg;
        try { msg = JSON.parse(errText).error; } catch { msg = errText; }
        const am = chatMessages[aIdx];
        am.content = 'Server error: ' + (msg || r.status);
        am.streaming = false;
        updateLastMsg();
        document.getElementById('chat-send').disabled = false;
        return;
      } catch (fetchErr) {
        if (fetchErr.name === 'AbortError') throw fetchErr;
        if (attempt < 2) {
          const delay = (attempt + 1) * 2;
          const am = chatMessages[aIdx];
          am.content += `*Network error, retrying in ${delay}s...*\n`;
          updateLastMsg();
          await new Promise(ok => setTimeout(ok, delay * 1000));
          continue;
        }
        throw fetchErr;
      }
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        const am = chatMessages[aIdx];
        if (ev.type === 'thinking_start') {
          am.timeline.push({ type: 'thinking', text: '' });
          updateLastMsg();
        } else if (ev.type === 'thinking') {
          // Append to the current thinking block
          const last = am.timeline[am.timeline.length - 1];
          if (last && last.type === 'thinking') { last.text += ev.delta; }
          else { am.timeline.push({ type: 'thinking', text: ev.delta }); }
          updateLastMsg();
        } else if (ev.type === 'text') {
          am.content += ev.delta;
          // Append to timeline: merge with last text entry or create new one
          const last = am.timeline[am.timeline.length - 1];
          if (last && last.type === 'text') { last.text += ev.delta; }
          else { am.timeline.push({ type: 'text', text: ev.delta }); }
          updateLastMsg();
        } else if (ev.type === 'tool_start') {
          am.toolSteps.push({ name: ev.name, summary: ev.summary || ev.name });
          am.timeline.push({ type: 'tool', name: ev.name, summary: ev.summary || ev.name, done: false });
          updateLastMsg();
        } else if (ev.type === 'tool_done') {
          // Mark the tool as done in timeline
          for (let i = am.timeline.length - 1; i >= 0; i--) {
            if (am.timeline[i].type === 'tool' && am.timeline[i].name === ev.name && !am.timeline[i].done) {
              am.timeline[i].done = true; break;
            }
          }
          // Checkpoint after every tool completion — survives connection drops
          saveChatState();
        } else if (ev.type === 'code_update') {
          suppressAutoCompile = true;
          editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: ev.code } });
          suppressAutoCompile = false;
          autoCompile();
        } else if (ev.type === 'highlight') {
          highlightEditorLines(ev.startLine, ev.endLine, ev.message);
        } else if (ev.type === 'switch_tab') {
          showTab(ev.tab);
        } else if (ev.type === 'terminal_append') {
          const isTool = ev.text.startsWith('[tool]');
          if (isTool) {
            const cls = ev.text.includes('❌') ? 'term-tool-err' : ev.text.includes('✓') ? 'term-tool-ok' : 'term-tool';
            appendTerminal(`<span class="${cls}">${escHtml(ev.text)}</span>\n`);
          } else {
            appendTerminal(`<span class="term-cmd">${escHtml(ev.text)}</span>\n`);
          }
          if (activeTab !== 'terminal') showToast(ev.text.slice(0, 60));
        } else if (ev.type === 'undo') {
          if (undoCmd) undoCmd(editor);
          autoCompile();
        } else if (ev.type === 'screenshot_request') {
          captureOutputScreenshot();
        } else if (ev.type === 'context_usage') {
          updateContextMeter(ev.percent, ev.used, ev.max);
        } else if (ev.type === 'done') {
          am.streaming = false;
          updateLastMsg();
        } else if (ev.type === 'error') {
          am.content += (am.content ? '\n\n' : '') + 'Error: ' + ev.message;
          am.streaming = false;
          updateLastMsg();
        }
      }
    }
  } catch (err) {
    const am = chatMessages[aIdx];
    if (err.name === 'AbortError') {
      am.content += am.content ? '\n\n*Stopped.*' : '*Stopped.*';
    } else {
      const isNetErr = err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('ERR_CONNECTION');
      const errMsg = isNetErr
        ? '*Connection lost. Work above this line was saved.*'
        : '*Connection error: ' + err.message + '*';
      am.content += (am.content ? '\n\n' : '') + errMsg;
    }
    am.streaming = false;
    updateLastMsg();
  }

  currentAbort = null;
  chatMessages[aIdx].streaming = false;
  updateLastMsg();
  saveChatState();
  document.getElementById('chat-send').disabled = false;
  document.getElementById('chat-send').style.display = '';
  document.getElementById('chat-stop').style.display = 'none';
};

// ==========================================================================
// SCREENSHOT CAPTURE — triggered by Claude's screenshot_output tool
// ==========================================================================
async function captureOutputScreenshot() {
  try {
    const target = document.getElementById('preview-content');
    if (!target) { await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) }); return; }

    // Use html2canvas if available
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas(target, {
        useCORS: true,
        allowTaint: false,
        backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#fff',
        scale: 1,
        logging: false,
      });
      const base64 = canvas.toDataURL('image/png').split(',')[1];
      await fetch('/api/screenshot-data', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image: base64 }),
      });
    } else {
      await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) });
    }
  } catch (err) {
    await fetch('/api/screenshot-data', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({image: null}) }).catch(() => {});
  }
}

// ==========================================================================
window.highlightEditorLines = function(startLine, endLine, msg) {
  // Jump to the start line
  jumpToLine(startLine);
  // Flash all lines in range
  for (let ln = startLine; ln <= (endLine || startLine); ln++) {
    if (ln > editor.state.doc.lines) break;
    const lineObj = editor.state.doc.line(ln);
    const node = editor.domAtPos(lineObj.from)?.node;
    let el = node instanceof Element ? node : node?.parentElement;
    while (el && !el.classList.contains('cm-line')) el = el?.parentElement;
    if (el) {
      el.classList.remove('cm-claude-line');
      void el.offsetWidth;
      el.classList.add('cm-claude-line');
      setTimeout(() => el?.classList.remove('cm-claude-line'), 2000);
    }
  }
  if (msg) showToast('Claude: ' + msg);
};

// CHAT PANEL COLLAPSE
// ==========================================================================
// ==========================================================================
// DOCS VIEWER
// ==========================================================================
let docsCache = {};
let docsRaw = '';

function mdToDocHtml(md) {
  const lines = md.split('\n');
  const out = [];
  let inCode = false, codeLang = '', codeBuf = [];
  for (const line of lines) {
    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeLang = line.slice(3).trim(); codeBuf = []; continue; }
      out.push(`<pre class="doc-code"><code>${escHtml(codeBuf.join('\n'))}</code></pre>`);
      inCode = false; codeBuf = []; continue;
    }
    if (inCode) { codeBuf.push(line); continue; }
    if (line.startsWith('# '))  { out.push(`<h1 class="doc-h1">${escHtml(line.slice(2))}</h1>`); continue; }
    if (line.startsWith('## ')) { out.push(`<h2 class="doc-h2">${escHtml(line.slice(3))}</h2>`); continue; }
    if (line.startsWith('### ')){ out.push(`<h3 class="doc-h3">${escHtml(line.slice(4))}</h3>`); continue; }
    if (line.startsWith('- ') || line.startsWith('* ')) { out.push(`<li>${escHtml(line.slice(2))}</li>`); continue; }
    if (line.trim() === '') { out.push('<div class="doc-gap"></div>'); continue; }
    // Inline: **bold**, `code`
    let l = escHtml(line)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code class="doc-inline">$1</code>');
    out.push(`<p class="doc-p">${l}</p>`);
  }
  return out.join('');
}

function filterDocs(query) {
  if (!docsRaw) return;
  const el = document.getElementById('docs-content');
  if (!query.trim()) { el.innerHTML = mdToDocHtml(docsRaw); return; }
  const q = query.toLowerCase();
  const sections = docsRaw.split(/^(?=#{1,2} )/m);
  const matched = sections.filter(s => s.toLowerCase().includes(q));
  el.innerHTML = matched.length ? mdToDocHtml(matched.join('\n')) : '<p style="color:var(--tx3);padding:16px 0">No results.</p>';
}

window.openDocs = async function(which) {
  const overlay = document.getElementById('docs-overlay');
  const content = document.getElementById('docs-content');
  const search = document.getElementById('docs-search');
  overlay.style.display = '';
  document.getElementById('docs-tab-syntax').style.fontWeight = which === 'syntax' ? '700' : '';
  document.getElementById('docs-tab-guide').style.fontWeight = which === 'user-guide' ? '700' : '';
  if (search) search.value = '';
  content.innerHTML = '<p style="color:var(--tx3);padding:16px 0">Loading…</p>';
  if (docsCache[which]) {
    docsRaw = docsCache[which];
    content.innerHTML = mdToDocHtml(docsRaw);
    return;
  }
  try {
    const r = await fetch(`/api/docs/${which}`);
    if (!r.ok) throw new Error('Not found');
    docsRaw = await r.text();
    docsCache[which] = docsRaw;
    content.innerHTML = mdToDocHtml(docsRaw);
  } catch (e) {
    content.innerHTML = `<p style="color:var(--red)">Could not load docs: ${e.message}</p>`;
  }
};

window.closeDocs = function() {
  document.getElementById('docs-overlay').style.display = 'none';
};

// Close docs on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDocs();
});

window.toggleChat = function() {
  const pane = document.getElementById('chat-pane');
  const btn = document.getElementById('chat-toggle-btn');
  const collapsed = pane.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Show Chat ▶' : 'Hide Chat ◀';
  btn.title = collapsed ? 'Show Claude panel' : 'Hide Claude panel';
};

// ==========================================================================
// EDITOR / PREVIEW DRAG RESIZER
// ==========================================================================
(function() {
  const resizer = document.getElementById('ep-resizer');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');
  let dragging = false, startX = 0, startEditorW = 0, startPreviewW = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startEditorW = editorPane.getBoundingClientRect().width;
    startPreviewW = previewPane.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newEditorW = Math.max(200, startEditorW + dx);
    const newPreviewW = Math.max(200, startPreviewW - dx);
    // Use flex-grow ratios so window resize stays proportional
    const total = newEditorW + newPreviewW;
    editorPane.style.flex = `${newEditorW / total} 1 0`;
    previewPane.style.flex = `${newPreviewW / total} 1 0`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ==========================================================================
// CHAT PANEL DRAG RESIZER
// ==========================================================================
(function() {
  const resizer = document.getElementById('chat-resizer');
  const chatPane = document.getElementById('chat-pane');
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = chatPane.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    // Dragging left = wider chat (startX - clientX is positive)
    const dx = startX - e.clientX;
    const newW = Math.max(280, Math.min(800, startW + dx));
    chatPane.style.flex = `0 0 ${newW}px`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Boot
loadTemplates();
// Ready message is shown after /api/config resolves (see fetch above)
</script>
