<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clear Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234ab8d8'/%3E%3Cstop offset='100%25' stop-color='%231a6a85'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2L4 10v12l12 8 12-8V10L16 2z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M16 2L4 10l12 8 12-8L16 2z' fill='white' opacity='0.25'/%3E%3Cpath d='M4 10l12 8v12L4 22V10z' fill='%23000' opacity='0.1'/%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Orbitron:wght@700&display=swap');

/* Font vars — shared across all themes */
:root {
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 8px;
}

/* Dark theme — html prefix increases specificity over :root */
html[data-theme="dark"] {
  --bg: #0f1117; --bg2: #151821; --bg3: #1c1f2e;
  --bd: rgba(255,255,255,.06); --bd2: rgba(255,255,255,.1);
  --tx: #e2e8f0; --tx2: #a0aec0; --tx3: #5a6578; --tx4: #3a4258;
  --accent: #6c8cff; --accent2: #3b5bdb; --accent-glow: rgba(108,140,255,.12);
  --green: #34d399; --green-bg: rgba(52,211,153,.08);
  --red: #fb7185; --red-bg: rgba(251,113,133,.08);
  --amber: #b45309; --amber-bg: rgba(180,83,9,.08);
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  --kw-color: #7aa2f7; --str-color: #9ece6a; --num-color: #ff9e64;
  --cmt-color: #565f89; --op-color: #89ddff; --var-color: #c0caf5; --type-color: #bb9af7;
  --iframe-bg: #fff;
}

/* Light theme (default) */
:root, [data-theme="light"] {
  --bg: #f8f9fb; --bg2: #eef1f5; --bg3: #e2e7ee;
  --bd: rgba(0,0,0,.06); --bd2: rgba(0,0,0,.1);
  --tx: #1a202c; --tx2: #4a5568; --tx3: #a0aec0; --tx4: #cbd5e0;
  --accent: #4361ee; --accent2: #3a50d9; --accent-glow: rgba(67,97,238,.1);
  --green: #059669; --green-bg: rgba(5,150,105,.06);
  --red: #dc2626; --red-bg: rgba(220,38,38,.06);
  --amber: #d97706; --amber-bg: rgba(217,119,6,.06);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
  --kw-color: #2563eb; --str-color: #059669; --num-color: #d97706;
  --cmt-color: #94a3b8; --op-color: #6366f1; --var-color: #334155; --type-color: #7c3aed;
  --iframe-bg: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--tx); font-family: var(--font); font-size: 13px; -webkit-font-smoothing: antialiased; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100vh; }
#toolbar { flex-shrink: 0; height: 46px; display: flex; align-items: center; gap: 10px; padding: 0 16px; background: linear-gradient(180deg, var(--bg2), var(--bg)); border-bottom: 1px solid var(--bd); }
#main-area { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#editor-pane { display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 0; }
#ep-resizer { width: 5px; flex-shrink: 0; background: var(--bd2); cursor: col-resize; transition: background .15s; position: relative; z-index: 10; }
#ep-resizer:hover, #ep-resizer.dragging { background: var(--accent); }
#preview-pane { display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 0; border-left: 1px solid var(--bd); border-right: 1px solid var(--bd); }
#chat-pane { display: flex; flex-direction: column; overflow: hidden; background: var(--bg2); flex: 0 0 360px; min-width: 0; transition: flex-basis .2s ease; position: relative; }
#chat-pane.collapsed { flex-basis: 0 !important; }
#chat-resizer { width: 5px; flex-shrink: 0; background: var(--bd2); cursor: col-resize; transition: background .15s; position: relative; z-index: 10; }
#chat-resizer:hover, #chat-resizer.dragging { background: var(--accent); }
#status-bar { flex-shrink: 0; height: 24px; display: flex; align-items: center; gap: 16px; padding: 0 12px; background: var(--accent2); color: rgba(255,255,255,.8); font-size: 11px; font-family: var(--font); border-top: 1px solid var(--bd); }
#status-bar span { white-space: nowrap; }
.sb-sep { width: 1px; height: 12px; background: rgba(255,255,255,.2); }
.compile-stats-badge { display: none; font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; padding: 2px 10px; border-radius: 20px; background: color-mix(in oklch, var(--accent) 12%, transparent); border: 1px solid color-mix(in oklch, var(--accent) 25%, transparent); white-space: nowrap; letter-spacing: .3px; }
.compile-stats-badge.visible { display: inline-flex; align-items: center; gap: 6px; animation: stats-pop .3s ease-out; }
@keyframes stats-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
#chat-toggle-btn { background: none; border: 1px solid var(--bd2); border-radius: 6px; padding: 3px 10px; cursor: pointer; color: var(--tx3); font-size: 11px; font-weight: 500; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: all .15s; flex-shrink: 0; margin-left: auto; }
#chat-toggle-btn:hover { background: var(--bg3); color: var(--tx); border-color: var(--accent); }
@media (max-width: 1100px) { #chat-pane { width: 0 !important; } }

/* Toolbar */
#toolbar select { background: var(--bg3); color: var(--tx2); border: 1px solid var(--bd2); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-family: var(--font); cursor: pointer; transition: border-color .15s; }
#toolbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.toolbar-sep { width: 1px; height: 22px; background: var(--bd2); }
.toolbar-btn { background: var(--bg3); color: var(--tx2); border: 1px solid var(--bd2); border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.toolbar-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); transform: translateY(-1px); }
.toolbar-btn:active { transform: translateY(0); }
.toolbar-btn.primary { background: var(--accent2); color: #dde4ff; border-color: var(--accent2); }
.toolbar-btn.primary:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 2px 8px rgba(108,140,255,.3); }
#status { font-family: var(--mono); font-size: 11px; font-weight: 500; margin-left: auto; padding: 4px 10px; border-radius: 20px; transition: all .2s; }
.status-ok { color: var(--green); background: var(--green-bg); }
.status-err { color: var(--red); background: var(--red-bg); }
.status-compiling { color: var(--amber); background: var(--amber-bg); }

/* Editor */
#editor-mount { flex: 1; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
#editor-pane .cm-editor { flex: 1; overflow: auto; min-height: 0; }
#editor-pane .cm-editor .cm-scroller { font-family: var(--mono) !important; font-size: 13px !important; line-height: 1.7 !important; }
#editor-pane .cm-editor .cm-content { padding: 16px 0; }
#editor-pane .cm-editor .cm-gutters { background: var(--bg); border-right: 1px solid var(--bd); color: var(--tx4); min-width: 48px; }
#editor-pane .cm-editor .cm-activeLineGutter { background: var(--bg3); color: var(--tx3); }
#editor-pane .cm-editor .cm-activeLine { background: rgba(108,140,255,.03); }
#editor-pane .cm-editor .cm-selectionBackground { background: rgba(108,140,255,.15) !important; }
#editor-pane .cm-editor .cm-cursor { border-left-color: var(--accent); border-left-width: 2px; }
#editor-pane .cm-editor { background: var(--bg); }
#editor-pane .cm-editor .cm-line { caret-color: var(--accent); }
#editor-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--bd); font-size: 11px; font-weight: 600; font-family: var(--font); color: var(--tx3); text-transform: uppercase; letter-spacing: .05em; }
#editor-header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
#editor-header .dot.err { background: var(--red); }
#editor-toc { display: flex; flex-direction: column; gap: 0; padding: 8px 14px; background: var(--bg2); border-bottom: 2px solid var(--bd2); min-height: 0; max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
#editor-toc:empty { display: none; }
.toc-label { font-size: 10px; color: var(--tx4); font-family: var(--font); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.toc-btn { background: none; border: none; padding: 3px 8px; font-size: 12px; font-family: var(--font); color: var(--tx2); cursor: pointer; transition: all .12s; white-space: nowrap; border-radius: 4px; text-align: left; }
.toc-btn:hover { background: var(--bg3); color: var(--accent); }
.toc-btn.toc-sub { font-size: 11px; color: var(--tx3); padding-left: 20px; }
#errors { padding: 10px 14px; background: var(--bg2); border-top: 1px solid var(--bd); max-height: 130px; overflow-y: auto; font-family: var(--mono); font-size: 11px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
#errors:empty { display: none; }
.error-line { color: var(--red); padding: 3px 0; cursor: pointer; transition: opacity .1s; display: flex; align-items: baseline; gap: 6px; }
.error-line::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.error-line:hover { opacity: .8; }
.warning-line { color: var(--amber); padding: 3px 0; display: flex; align-items: baseline; gap: 6px; }
.warning-line::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 5px; }

/* Preview */
#preview-tabs { display: flex; gap: 0; background: var(--bg2); border-bottom: 1px solid var(--bd); }
.prev-tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--tx3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; position: relative; }
.prev-tab:hover { color: var(--tx2); }
.prev-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.prev-tab.active::after { display: none; }
#preview-content { flex: 1; overflow: auto; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
#preview-content iframe { width: 100%; height: 100%; border: none; background: var(--iframe-bg); border-radius: 0; }
#preview-content pre { padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.5; color: var(--tx2); white-space: pre-wrap; }
#terminal { flex: 1; overflow: auto; padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--tx2); background: var(--bg); scrollbar-width: thin; display: flex; flex-direction: column-reverse; }
#terminal .term-entry { padding: 4px 0; border-bottom: 1px solid var(--bd); opacity: 0.6; }
#terminal .term-entry:first-child { opacity: 1; color: var(--accent); border-bottom: none; }
.term-cmd { color: var(--accent); display: block; padding: 4px 0; border-top: 1px solid var(--bd); margin-top: 8px; }
.term-cmd::before { content: '❯ '; color: var(--tx3); font-weight: 700; }
.term-out { color: var(--tx2); white-space: pre-wrap; display: block; padding: 1px 0 1px 16px; }
.term-err { color: var(--red); white-space: pre-wrap; display: block; padding: 2px 8px; margin: 2px 0; background: color-mix(in oklch, var(--red) 8%, transparent); border-radius: 4px; border-left: 3px solid var(--red); }
.term-json { color: var(--tx); white-space: pre-wrap; display: block; padding: 6px 10px; margin: 4px 0 4px 16px; background: var(--bg2); border-radius: 6px; font-size: 11px; line-height: 1.5; border: 1px solid var(--bd); }
.term-json .json-key { color: var(--accent); }
.term-json .json-str { color: #a5d6a7; }
.term-json .json-num { color: #ffcc80; }
.term-json .json-bool { color: #ce93d8; }
.term-json .json-null { color: var(--tx3); font-style: italic; }
.term-status { color: var(--tx3); font-size: 11px; display: block; padding: 2px 0 2px 16px; }
.term-tool { color: var(--tx2); font-size: 11px; display: block; padding: 2px 0 2px 12px; border-left: 2px solid var(--accent); margin: 2px 0 2px 4px; }
.term-tool-err { color: var(--red); font-size: 11px; display: block; padding: 2px 8px; margin: 2px 0 2px 4px; background: color-mix(in oklch, var(--red) 6%, transparent); border-left: 2px solid var(--red); }
.term-tool-ok { color: var(--green); font-size: 11px; display: block; padding: 2px 0 2px 12px; border-left: 2px solid var(--green); margin: 2px 0 2px 4px; }
.code-tabs { display: flex; gap: 2px; padding: 4px 8px; background: var(--bg2); border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.code-tab { background: none; border: none; padding: 4px 12px; border-radius: 4px; color: var(--tx3); font-size: 11px; font-family: var(--font); font-weight: 500; cursor: pointer; transition: all .15s; }
.code-tab:hover { background: var(--bg3); color: var(--tx); }
.code-tab.active { background: var(--accent); color: #fff; }

/* Data tab */
#data-panel { height: 100%; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 16px; }
.data-table-block { border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; }
.data-table-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--bd); }
.data-table-name { font-family: var(--mono); font-weight: 600; font-size: 12px; color: var(--accent); }
.data-table-count { font-size: 11px; color: var(--tx3); }
.data-refresh-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--bd2); background: none; color: var(--tx2); cursor: pointer; }
.data-refresh-btn:hover { background: var(--bg3); color: var(--accent); }
.data-grid { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-grid th { padding: 6px 10px; background: var(--bg2); color: var(--tx3); font-weight: 500; text-align: left; border-bottom: 1px solid var(--bd); font-family: var(--mono); font-size: 11px; }
.data-grid td { padding: 6px 10px; border-bottom: 1px solid var(--bd); color: var(--tx2); font-family: var(--mono); font-size: 11px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.data-grid tr:last-child td { border-bottom: none; }
.data-grid tr:hover td { background: var(--accent-glow); }
.data-del-btn { background: none; border: none; color: var(--tx4); cursor: pointer; font-size: 13px; padding: 0 4px; border-radius: 3px; }
.data-del-btn:hover { color: var(--red); background: var(--red-bg); }
.data-empty { padding: 20px; text-align: center; color: var(--tx3); font-size: 12px; }
.data-no-app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--tx3); }
.data-no-app .icon { font-size: 28px; opacity: .4; }

/* Meta chips */
#meta-chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 5px 12px; border-bottom: 1px solid var(--bd); min-height: 0; }
#meta-chips:empty { display: none; }
.chip { font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; border: none; color: var(--tx3); background: none; white-space: nowrap; cursor: default; user-select: none; }
.chip.chip-table { color: var(--accent); }
.chip.chip-agent { color: var(--green); }
.chip.chip-auth  { color: var(--amber); }
.chip.chip-route { color: var(--tx2); }

/* API tab */
#api-panel { height: 100%; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.ep-card { border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; }
.ep-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); cursor: pointer; user-select: none; }
.ep-header:hover { background: var(--bg3); }
.ep-method { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 44px; text-align: center; }
.ep-get    { background: rgba(52,211,153,.15); color: var(--green); }
.ep-post   { background: rgba(108,140,255,.15); color: var(--accent); }
.ep-put    { background: rgba(251,191,36,.15);  color: var(--amber); }
.ep-delete { background: rgba(251,113,133,.15); color: var(--red); }
.ep-path   { font-family: var(--mono); font-size: 12px; color: var(--tx); flex: 1; }
.ep-body { padding: 10px 12px; border-top: 1px solid var(--bd); display: flex; flex-direction: column; gap: 8px; }
.ep-body textarea { width: 100%; font-family: var(--mono); font-size: 11px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--bd2); border-radius: 4px; color: var(--tx); resize: vertical; min-height: 60px; }
.ep-body input[type=text] { font-family: var(--mono); font-size: 11px; padding: 5px 8px; background: var(--bg); border: 1px solid var(--bd2); border-radius: 4px; color: var(--tx); width: 140px; }
.ep-send-btn { align-self: flex-start; font-size: 11px; padding: 4px 14px; border-radius: 5px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; }
.ep-send-btn:hover { background: var(--accent2); }
.ep-response { font-family: var(--mono); font-size: 11px; padding: 8px 10px; border-radius: 4px; border: 1px solid var(--bd); background: var(--bg); white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow: auto; }
.ep-status-ok  { color: var(--green); font-weight: 600; }
.ep-status-err { color: var(--red);   font-weight: 600; }

/* Chat */
#chat-header { padding: 12px 16px; border-bottom: 1px solid var(--bd); font-size: 13px; font-weight: 600; color: var(--tx2); font-family: var(--font); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(108,140,255,.03), transparent); }
#chat-messages { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 14px; max-width: 768px; width: 100%; margin: 0 auto; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
.msg { padding: 10px 14px; border-radius: 12px; font-size: 14.5px; line-height: 1.6; max-width: 50ch; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { background: var(--accent2); color: #dde4ff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant { background: transparent; color: var(--tx); align-self: flex-start; font-family: 'Lora', Georgia, serif; font-size: 14.5px; }
.msg pre { background: var(--bg); padding: 10px 12px; border-radius: 6px; margin: 8px 0; font-family: var(--mono); font-size: 12px; line-height: 1.5; overflow-x: auto; position: relative; border: 1px solid var(--bd); white-space: pre-wrap; word-wrap: break-word; }
.msg table { border-collapse: collapse; margin: 8px 0; font-size: 12px; width: 100%; }
.msg th, .msg td { border: 1px solid var(--bd2); padding: 5px 10px; text-align: left; }
.msg th { background: var(--bg); font-weight: 600; }
.msg td { background: var(--bg2); }
.msg code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 12px; border: 1px solid var(--bd); }
.msg pre code { background: none; padding: 0; border: none; }
.msg .code-block { position: relative; margin: 8px 0; }
.msg .code-block .code-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: var(--bg2); border: 1px solid var(--bd); border-bottom: none; border-radius: 6px 6px 0 0; font-size: 10px; font-family: var(--mono); color: var(--tx3); }
.msg .code-block .code-header + pre { margin-top: 0; border-top-left-radius: 0; border-top-right-radius: 0; }
.msg .code-btns { display: flex; gap: 4px; }
.msg .code-btn { background: var(--bg3); color: var(--tx3); border: 1px solid var(--bd2); border-radius: 3px; padding: 1px 8px; font-size: 10px; font-weight: 500; cursor: pointer; transition: all .15s; }
.msg .code-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.msg .apply-btn { position: absolute; top: 6px; right: 6px; background: var(--accent2); color: #dde4ff; border: none; border-radius: 4px; padding: 3px 10px; font-size: 10px; font-weight: 600; cursor: pointer; transition: all .15s; }
.msg .apply-btn:hover { background: var(--accent); transform: translateY(-1px); }
.msg .svg-diagram { margin: 8px 0; padding: 12px; background: var(--bg); border: 1px solid var(--bd); border-radius: 6px; overflow-x: auto; text-align: center; cursor: pointer; position: relative; }
.msg .svg-diagram:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
.msg .svg-diagram::after { content: '⤢ Click to expand'; position: absolute; bottom: 4px; right: 8px; font-size: 9px; color: var(--tx3); opacity: 0; transition: opacity .15s; pointer-events: none; }
.msg .svg-diagram:hover::after { opacity: 1; }
.msg .svg-diagram svg { max-width: 100%; height: auto; }

#personality-setup button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: 700; font-family: var(--font); transition: all .15s; }

/* Compile animation — shimmer bar across toolbar */

.doc-h2 { font-size:15px; font-weight:600; color:var(--accent); margin:20px 0 6px; }
.doc-h3 { font-size:13px; font-weight:600; color:var(--tx2); margin:14px 0 4px; }
.doc-p  { margin:3px 0; color:var(--tx2); }

li { margin:2px 0 2px 20px; color:var(--tx2); }

.empty-state .icon { font-size: 32px; opacity: .5; margin-bottom: 4px; }

.empty-state .hint { font-size: 12px; opacity: .7; }

/* Saved toast */

@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--tx); border: 1px solid var(--bd2); border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 500; z-index: 1000; animation: toastIn .2s ease, toastOut .3s ease 2s forwards; box-shadow: var(--shadow); }

/* Compile animation — scan lines */
@keyframes scanPulse { 0% { background: rgba(108,140,255,.15); } 100% { background: transparent; } }
.cm-scan-line { animation: scanPulse .6s ease-out forwards; }
.cm-compile-highlight { background: rgba(108,140,255,.12); transition: background .4s ease; }

/* Jump-to highlight — flash a line in the editor */
@keyframes lineFlash { 0%,100% { background: transparent; } 15%,70% { background: rgba(251,191,36,.5); } }
.cm-jump-line { animation: lineFlash 1.2s ease; }

/* Source map highlight — steady glow on mapped compiled lines */
.cm-source-map-highlight { background: rgba(108,140,255,.25); transition: background .15s; border-left: 3px solid var(--accent); }
.cm-source-map-active { background: rgba(251,191,36,.25); border-left: 3px solid var(--amber); }

/* Compile animation — split view */
.compile-anim { display: flex; height: 100%; gap: 0; }
.compile-anim-left, .compile-anim-right { flex: 1; overflow: auto; padding: 8px; scrollbar-width: thin; }
.compile-anim-left { border-right: 1px solid var(--bd); }
.compile-anim-arrow { display: flex; align-items: center; padding: 0 8px; color: var(--accent); font-size: 18px; font-weight: bold; }
.compile-anim-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--tx3); padding: 2px 0 6px; }
.compile-anim pre { font-family: var(--mono); font-size: 11px; line-height: 1.6; margin: 0; }
.ca-line { display: block; padding: 0 4px; border-radius: 2px; transition: background .15s; }
.ca-active { background: rgba(108,140,255,.25); color: var(--accent); }
.ca-done { opacity: 0.5; }
.ca-reveal { animation: caReveal .25s ease forwards; }
@keyframes caReveal { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }

/* Compiled code — line numbers */
#preview-content pre { counter-reset: compiled-line; padding: 0; }
#preview-content pre .cl { counter-increment: compiled-line; display: flex; min-height: 1.5em; }
#preview-content pre .cl::before { content: counter(compiled-line); min-width: 44px; padding: 0 12px 0 16px; color: var(--tx4); font-size: 11px; text-align: right; user-select: none; flex-shrink: 0; border-right: 1px solid var(--bd); margin-right: 12px; line-height: 1.5em; }
#preview-content pre .cl-code { flex: 1; white-space: pre-wrap; word-break: break-word; max-width: 50ch; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }

/* Smooth transitions for theme switch — exclude CodeMirror internals */

.toolbar-btn, .prev-tab, #chat-header, #chat-input-area, #chat-input,
#chat-send, #errors, .msg, .toast, #theme-toggle, select {
  transition: background-color .2s, border-color .2s, color .15s;
}
</style>

<div id="app">

  startState: () => ({ inComment: false }),
  token(stream, state) {
    if (stream.match(/^#.*/)) return 'comment';
    if (stream.match(/^'[^']*'/)) return 'string';
    if (stream.match(/^"[^"]*"/)) return 'string';
    if (stream.match(/^\d+(\.\d+)?/)) return 'number';
    if (stream.match(/^\/api\/[a-zA-Z0-9_/:.-]*/)) return 'string';
    if (stream.match(/^\/[a-z][a-zA-Z0-9_/-]*/)) return 'string';
    if (stream.match(/^[=+\-*/<>!]+/)) return 'operator';
    if (stream.match(/^[a-zA-Z_][a-zA-Z0-9_]*/)) {
      const w = stream.current();
      if (clearKeywords.has(w)) return 'keyword';
      if (w === w.toUpperCase() && w.length > 1) return 'typeName';
      return 'variableName';
    }
    stream.next();
    return null;
  },
});

let sourceMapTab = null; // which compiled sub-tab key the source map was built from ('serverJS', 'javascript', 'python')

function buildSourceMap(compiledCode) {
  if (!compiledCode) return null;
  const lines = compiledCode.split('\n');
  const forward = {};  // clearLine → [{ start, end }]
  const reverse = {};  // compiledLine (0-indexed) → clearLine
  let currentClear = null, blockStart = -1;

  for (let i = 0; i < lines.length; i++) {
    // Match JS/Python comments (// clear:N, # clear:N) or HTML attributes (data-clear-line="N")
    const m = lines[i].match(/(?:\/\/|#) clear:(\d+)/) || lines[i].match(/data-clear-line="(\d+)"/);
    if (m) {
      if (currentClear !== null && blockStart >= 0) {
        const range = { start: blockStart, end: i - 1 };
        (forward[currentClear] = forward[currentClear] || []).push(range);
        for (let j = blockStart; j < i; j++) reverse[j] = currentClear;
      }
      currentClear = parseInt(m[1]);
      blockStart = i;
    }
  }
  if (currentClear !== null && blockStart >= 0) {
    const range = { start: blockStart, end: lines.length - 1 };
    (forward[currentClear] = forward[currentClear] || []).push(range);
    for (let j = blockStart; j <= lines.length - 1; j++) reverse[j] = currentClear;
  }

  return Object.keys(forward).length > 0
    ? { forward, reverse, compiledLines: lines }
    : null;
}

  const line = editor.state.doc.lineAt(pos).number;

function highlightCompiledLines(ranges) {
  if (!compiledView) return;

  // Step 1: Scroll to target area so CM6 renders those lines in the DOM
  const firstLine = ranges[0].start + 1;
  if (firstLine >= 1 && firstLine <= compiledView.state.doc.lines) {
    const lineObj = compiledView.state.doc.line(firstLine);
    compiledView.dispatch({ effects: EditorView.scrollIntoView(lineObj.from, { y: 'center' }) });
  }

  // Step 2: Wait for CM6 to process scroll and render the target viewport
  setTimeout(() => {
    if (!compiledView) return;
    // Clear old highlights
    compiledView.dom.querySelectorAll('.cm-source-map-highlight')
      .forEach(el => el.classList.remove('cm-source-map-highlight'));

    for (const { start, end } of ranges) {
      for (let i = start + 1; i <= end + 1; i++) {
        if (i < 1 || i > compiledView.state.doc.lines) continue;
        try {
          const lineObj = compiledView.state.doc.line(i);
          const domPos = compiledView.domAtPos(lineObj.from);
          let el = domPos?.node;
          if (!(el instanceof Element)) el = el?.parentElement;
          while (el && !el.classList.contains('cm-line')) el = el.parentElement;
          if (el) el.classList.add('cm-source-map-highlight');
        } catch (_) { /* line not yet rendered */ }
      }
    }
  }, 100);
}

function updateEditorTOC(source) {
  const tocEl = document.getElementById('editor-toc');
  if (!tocEl) return;
  const lines = source.split('\n');
  const sections = [];
  lines.forEach((line, idx) => {
    const m = line.match(/^(#{1,2})\s+(.+)/);
    if (!m) return;
    // Skip diagram/ASCII art lines, JUMP TO line, TODO comments
    if (/[│┌┐└┘├┤┬┴─═▼▲]/.test(m[2]) || /[|].*[|]/.test(m[2]) || /[<>]-{2,}/.test(m[2])) return;
    if (/^JUMP TO/i.test(m[2])) return;
    if (/^TODO/i.test(m[2])) return;
    // Strip decorative dashes: "--- Section ---" → "Section"
    let label = m[2].trim().replace(/^-+\s*/, '').replace(/\s*-+$/, '').trim();
    if (!label) return; // skip blank after stripping
    // Truncate long labels
    if (label.length > 28) label = label.slice(0, 26) + '…';
    sections.push({ level: m[1].length, label, lineNum: idx + 1 });
  });
  if (!sections.length) { tocEl.innerHTML = ''; return; }
  tocEl.innerHTML =
    `<div class="toc-label">Jump to</div>` +
    sections.map(s =>
      `<button class="toc-btn${s.level === 2 ? ' toc-sub' : ''}" onclick="jumpToLine(${s.lineNum})" title="Line ${s.lineNum}">${escHtml(s.label)}</button>`
    ).join('');
}

// COMPILE
// ==========================================================================
let compileAnimCancel = false;
let compileAnimRunning = false;
let compileAnimGeneration = 0; // monotonic counter to detect stale animations

function clearEditorHighlights() {
  document.querySelectorAll('.cm-scan-line').forEach(el => el.classList.remove('cm-scan-line'));
}

async function runScanAnimation(source) {
  // Lightweight pre-compile scan — highlights lines in the editor as they're "read"
  const lines = source.split('\n');
  if (lines.length > 150) return; // skip for large files
  clearEditorHighlights(); // clear any leftover highlights from previous compile
  const msPerLine = Math.max(20, Math.min(50, 1500 / Math.max(lines.length, 1)));
  const gen = ++compileAnimGeneration;
  compileAnimCancel = false;
  for (let i = 0; i < lines.length; i++) {
    if (compileAnimCancel || gen !== compileAnimGeneration) return;
    if (i + 1 > editor.state.doc.lines) break;
    const lineObj = editor.state.doc.line(i + 1);
    const domPos = editor.domAtPos(lineObj.from);
    let el = domPos?.node instanceof Element ? domPos.node : domPos?.node?.parentElement;
    while (el && !el.classList.contains('cm-line')) el = el.parentElement;
    if (el) { el.classList.add('cm-scan-line'); }
    await new Promise(r => setTimeout(r, msPerLine));
  }
}

// Post-compile animation: highlight source lines in editor (left) while building
// compiled output in the real CodeMirror editor (right). Uses // clear:N markers.
async function runCompileAnimation(clearSource, compiledCode) {
  if (!compiledCode) return;
  const clearLines = clearSource.split('\n');
  const compiledLines = compiledCode.split('\n');
  if (clearLines.length > 150) return; // too big, skip

  // Parse // clear:N markers to build mapping
  const mapping = []; // [{ clearLine, start, end }]
  let currentClear = null;
  let blockStart = -1;
  for (let i = 0; i < compiledLines.length; i++) {
    const m = compiledLines[i].match(/\/\/ clear:(\d+)/);
    if (m) {
      if (currentClear !== null && blockStart >= 0) {
        mapping.push({ clearLine: currentClear, start: blockStart, end: i - 1 });
      }
      currentClear = parseInt(m[1]);
      blockStart = i;
    }
  }
  if (currentClear !== null && blockStart >= 0) {
    mapping.push({ clearLine: currentClear, start: blockStart, end: compiledLines.length - 1 });
  }

  if (mapping.length === 0) return; // no markers, skip

  // Cancel any previous animation and reset state
  compileAnimCancel = false;
  compileAnimRunning = true;
  const gen = ++compileAnimGeneration;
  clearEditorHighlights();

  // Switch to Code tab visually (without calling showCompiled which would conflict)
  activeTab = 'compiled';
  document.querySelectorAll('.prev-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.prev-tab[onclick*="compiled"]').classList.add('active');
  const el = document.getElementById('preview-content');

  // Determine language for syntax highlighting
  const isPython = lastCompiled?.python && compiledCode === lastCompiled.python;
  const langExt = isPython ? pythonTokenizer : javascript();

  // Build the Code tab with skip button + empty CodeMirror
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-bottom:1px solid var(--bd);';
  tabBar.innerHTML = `<span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);">Compiling...</span>
    <button class="toolbar-btn" onclick="compileAnimCancel=true" style="font-size:11px;padding:2px 10px;">Skip</button>`;

  const viewContainer = document.createElement('div');
  viewContainer.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;';

  el.innerHTML = '';
  el.appendChild(tabBar);
  el.appendChild(viewContainer);

  // Create a fresh read-only CodeMirror starting with empty content
  if (compiledView) { compiledView.destroy(); compiledView = null; }
  compiledView = new EditorView({
    doc: '',
    extensions: [
      lineNumbers(),
      highlightActiveLine(),
      drawSelection(),
      langExt,
      syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
      EditorState.readOnly.of(true),
      EditorView.editable.of(false),
      EditorView.theme({
        '&': { height: '100%', fontSize: '13px' },
        '.cm-scroller': { overflow: 'auto', fontFamily: 'var(--mono)', lineHeight: '1.7' },
        '.cm-gutters': { background: 'var(--bg2)', borderRight: '1px solid var(--bd)', color: 'var(--tx4)' },
        '.cm-content': { padding: '8px 0' },
      }),
    ],
  });
  viewContainer.appendChild(compiledView.dom);

  // Cap total animation at ~5 seconds regardless of file size
  const msPerBlock = Math.max(80, Math.min(400, 5000 / Math.max(mapping.length, 1)));
  let prevLeftHighlight = null;
  let prevRightHighlights = [];

  // Helper: highlight a source line in the left editor
  function highlightSourceLine(lineNum) {
    if (prevLeftHighlight) prevLeftHighlight.classList.remove('cm-scan-line');
    if (lineNum < 1 || lineNum > editor.state.doc.lines) return;
    const lineObj = editor.state.doc.line(lineNum);
    const domPos = editor.domAtPos(lineObj.from);
    let lineEl = domPos?.node instanceof Element ? domPos.node : domPos?.node?.parentElement;
    while (lineEl && !lineEl.classList.contains('cm-line')) lineEl = lineEl.parentElement;
    if (lineEl) {
      lineEl.classList.remove('cm-scan-line');
      void lineEl.offsetWidth;
      lineEl.classList.add('cm-scan-line');
      lineEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      prevLeftHighlight = lineEl;
    }
  }

  // Helper: highlight lines in the right compiled CodeMirror
  function highlightCompiledLines(startLine, endLine) {
    // Remove previous highlights
    prevRightHighlights.forEach(el => el.classList.remove('cm-compile-highlight'));
    prevRightHighlights = [];
    if (!compiledView) return;
    for (let i = startLine; i <= endLine; i++) {
      if (i < 1 || i > compiledView.state.doc.lines) continue;
      const lineObj = compiledView.state.doc.line(i);
      const domPos = compiledView.domAtPos(lineObj.from);
      let lineEl = domPos?.node instanceof Element ? domPos.node : domPos?.node?.parentElement;
      while (lineEl && !lineEl.classList.contains('cm-line')) lineEl = lineEl.parentElement;
      if (lineEl) {
        lineEl.classList.add('cm-compile-highlight');
        prevRightHighlights.push(lineEl);
      }
    }
    // Scroll last highlighted line into view
    if (prevRightHighlights.length > 0) {
      prevRightHighlights[prevRightHighlights.length - 1].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  let totalInserted = 0; // track how many lines we've inserted so far

  for (const block of mapping) {
    if (compileAnimCancel || gen !== compileAnimGeneration) break;

    // LEFT: highlight the source line
    highlightSourceLine(block.clearLine);

    // RIGHT: append this block's compiled lines to the CodeMirror editor
    const chunk = compiledLines.slice(block.start, block.end + 1).join('\n');
    const insertText = totalInserted === 0 ? chunk : '\n' + chunk;
    const docLen = compiledView.state.doc.length;

    compiledView.dispatch({
      changes: { from: docLen, insert: insertText },
    });

    const newStartLine = totalInserted + 1;
    const linesAdded = block.end - block.start + 1;
    totalInserted += linesAdded;

    // Wait for CodeMirror to render, then scroll vertically only (no horizontal shift)
    await new Promise(r => requestAnimationFrame(r));
    const scroller = compiledView.dom.querySelector('.cm-scroller');
    if (scroller) { scroller.scrollTop = scroller.scrollHeight; scroller.scrollLeft = 0; }
    highlightCompiledLines(newStartLine, totalInserted);

    await new Promise(r => setTimeout(r, msPerBlock));
  }

  // Clean up if this is still the active animation
  if (gen === compileAnimGeneration) {
    clearEditorHighlights();
    prevRightHighlights.forEach(el => el.classList.remove('cm-compile-highlight'));
    if (!compileAnimCancel) await new Promise(r => setTimeout(r, 400));
    compileAnimRunning = false;
    // Don't call showCompiled() — the CodeMirror already has all the code
  }
}

async function autoCompile() {
  const source = editor.state.doc.toString();
  setStatus('compiling', 'Compiling...');
  runScanAnimation(source); // fire-and-forget; real result replaces it when done
  const t0 = performance.now();
  try {
    const r = await fetch('/api/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source }),
    });
    const elapsed = Math.round(performance.now() - t0);
    lastCompiled = await r.json();
    // Build persistent source map from compiled output — pick the target with markers
    if (lastCompiled.serverJS) { sourceMapData = buildSourceMap(lastCompiled.serverJS); sourceMapTab = 'serverJS'; }
    else if (lastCompiled.javascript) { sourceMapData = buildSourceMap(lastCompiled.javascript); sourceMapTab = 'javascript'; }
    else if (lastCompiled.python) { sourceMapData = buildSourceMap(lastCompiled.python); sourceMapTab = 'python'; }
    else { sourceMapData = null; sourceMapTab = null; }
    // Show clickable errors below editor (compact) — full detail in Code pane
    showErrors(lastCompiled.errors, lastCompiled.warnings);
    // Update compile dot
    const dot = document.getElementById('compile-dot');
    if (lastCompiled.errors.length === 0) {
      if (dot) dot.className = 'dot';
      setStatus('ok', `OK${lastCompiled.warnings?.length ? ` (${lastCompiled.warnings.length} warnings)` : ''}`);
      // Show compile stats
      const clearWords = source.split(/\s+/).filter(w => w && !w.startsWith('#') && !w.startsWith('//')).length;
      const outCode = [lastCompiled.html, lastCompiled.serverJS, lastCompiled.javascript, lastCompiled.python].filter(Boolean).join('\n');
      const codeWords = outCode.split(/\s+/).filter(w => w).length;
      const statsEl = document.getElementById('sb-compile-stats');
      if (statsEl) { statsEl.textContent = `${clearWords} → ${codeWords} words · ${elapsed}ms`; statsEl.style.display = ''; }
      // Prominent badge in toolbar
      const badge = document.getElementById('compile-stats-badge');
      if (badge) {
        badge.textContent = `${clearWords} → ${codeWords} words · ${elapsed}ms`;
        badge.classList.remove('visible');
        void badge.offsetWidth; // force reflow for re-animation
        badge.classList.add('visible');
      }
      // Update target info in status bar
      const target = lastCompiled.html ? (lastCompiled.serverJS ? 'web + backend' : 'web') : (lastCompiled.python ? 'python' : lastCompiled.javascript ? 'backend' : 'script');
      const tEl = document.getElementById('sb-target');
      if (tEl) tEl.textContent = target;
      // Show Run/Stop now that we have a compiled result
      document.getElementById('run-btn').style.display = '';
      document.getElementById('stop-btn').style.display = '';
      // Show/hide contextual tabs and meta chips
      const srcInfo = parseSourceInfo();
      document.getElementById('data-tab-btn').style.display = srcInfo.tables.length > 0 ? '' : 'none';
      document.getElementById('api-tab-btn').style.display = srcInfo.endpoints.length > 0 ? '' : 'none';
      document.getElementById('download-btn').style.display = lastCompiled.html ? '' : 'none';
      showMetaChips();
      // Compiler animation — show line-by-line mapping if we have source markers
      compileAnimCancel = true; // cancel any in-progress pre-scan
      const animTarget = lastCompiled.serverJS || lastCompiled.javascript;
      if (animTarget && animTarget.includes('// clear:') && clearWords <= 150) {
        runCompileAnimation(source, animTarget);
      }

      // Auto-preview: web apps show instantly; JS backends auto-run
      // BUT don't switch tabs if compile animation is playing
      if (!compileAnimRunning) {
        if (lastCompiled.html && !lastCompiled.serverJS) {
          showTab('output');
        } else if (lastCompiled.serverJS) {
          if (runningPort) { await fetch('/api/stop', { method: 'POST' }); runningPort = null; }
          doRun();
        } else {
          if (activeTab === 'output') showOutput();
          else if (activeTab === 'compiled') showCompiled();
        }
      } else if (lastCompiled.serverJS) {
        // Still start the server in the background, just don't switch tabs
        if (runningPort) { await fetch('/api/stop', { method: 'POST' }); runningPort = null; }
        doRun();
      }
    } else {
      if (dot) dot.className = 'dot err';
      setStatus('err', `${lastCompiled.errors.length} error${lastCompiled.errors.length > 1 ? 's' : ''}`);
      // Show errors in the Code pane so they're impossible to miss
      showTab('compiled');
      const el = document.getElementById('preview-content');
      el.innerHTML = '<div style="padding:24px;font-family:var(--mono);font-size:13px;line-height:1.8;">' +
        '<div style="font-size:16px;font-weight:700;color:var(--red);margin-bottom:16px;">' +
        lastCompiled.errors.length + ' error' + (lastCompiled.errors.length > 1 ? 's' : '') + '</div>' +
        lastCompiled.errors.map(e =>
          '<div style="cursor:pointer;padding:8px 12px;margin:4px 0;border-radius:8px;background:color-mix(in oklch,var(--red) 8%,transparent);border:1px solid color-mix(in oklch,var(--red) 20%,transparent);" onclick="jumpToLine(' + (e.line || 1) + ')">' +
          '<span style="color:var(--red);font-weight:600;">Line ' + (e.line || '?') + ':</span> ' +
          '<span style="color:var(--tx);">' + escHtml(e.message) + '</span></div>'
        ).join('') +
        (lastCompiled.warnings?.length ? '<div style="margin-top:16px;font-size:14px;font-weight:600;color:var(--amber);margin-bottom:8px;">' + lastCompiled.warnings.length + ' warning' + (lastCompiled.warnings.length > 1 ? 's' : '') + '</div>' +
          lastCompiled.warnings.map(w => {
            const msg = typeof w === 'string' ? w : w.message || '';
            return '<div style="padding:6px 12px;margin:4px 0;color:var(--amber);font-size:12px;">' + escHtml(msg) + '</div>';
          }).join('') : '') +
        '</div>';
    }
  } catch (err) {
    console.error('Compile error:', err);
    setStatus('err', err.message || 'Compile failed');
    // Show crash errors in Code pane too
    showTab('compiled');
    const el = document.getElementById('preview-content');
    el.innerHTML = '<div style="padding:24px;font-family:var(--mono);font-size:13px;">' +
      '<div style="font-size:16px;font-weight:700;color:var(--red);margin-bottom:16px;">Compile crashed</div>' +
      '<div style="padding:8px 12px;border-radius:8px;background:color-mix(in oklch,var(--red) 8%,transparent);border:1px solid color-mix(in oklch,var(--red) 20%,transparent);color:var(--tx);">' +
      escHtml(err.message || 'Unknown error') + '</div>' +
      (err.stack ? '<pre style="margin-top:12px;font-size:11px;color:var(--tx3);white-space:pre-wrap;">' + escHtml(err.stack) + '</pre>' : '') +
      '</div>';
  }
}

// Python tokenizer for Code tab highlighting
const pythonTokenizer = StreamLanguage.define({
  token(stream) {
    if (stream.match(/#.*/)) return 'lineComment';
    if (stream.match(/"""/) || stream.match(/'''/)) { stream.skipTo(stream.current().slice(0,3)) || stream.skipToEnd(); return 'string'; }
    if (stream.match(/"[^"]*"/) || stream.match(/'[^']*'/)) return 'string';
    if (stream.match(/f"/)) { stream.skipTo('"') || stream.skipToEnd(); stream.next(); return 'string'; }
    if (stream.match(/\b\d+\.?\d*\b/)) return 'number';
    if (stream.match(/\b(def|class|import|from|return|if|elif|else|for|in|while|try|except|finally|with|as|async|await|yield|raise|pass|break|continue|not|and|or|is|None|True|False|self)\b/)) return 'keyword';
    stream.next();
    return null;
  },
});

  if (lastCompiled.javascript && !lastCompiled.serverJS) outputs.push({ key: 'javascript', label: 'JavaScript', code: lastCompiled.javascript, lang: 'js' });
  if (lastCompiled.javascript && lastCompiled.serverJS) outputs.push({ key: 'javascript', label: 'Client JS', code: lastCompiled.javascript, lang: 'js' });

    return;
  }

  // Default to first tab, or keep current if still valid
  if (!compiledTab || !outputs.find(o => o.key === compiledTab)) compiledTab = outputs[0].key;
  const active = outputs.find(o => o.key === compiledTab);

  // Build sub-tab bar
  const tabBar = outputs.length > 1
    ? '<div class="code-tabs">' + outputs.map(o =>
        `<button class="code-tab${o.key === compiledTab ? ' active' : ''}" onclick="switchCodeTab('${o.key}')">${o.label}</button>`
      ).join('') + '</div>'
    : '';

  // Render
  el.innerHTML = tabBar;
  const viewContainer = document.createElement('div');
  viewContainer.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;';
  el.appendChild(viewContainer);

  // Language extension
  const langExt = active.lang === 'py' ? pythonTokenizer : javascript();

  // Create fresh read-only CodeMirror with proper language highlighting
  compiledView = new EditorView({
    doc: active.code,
    extensions: [
      lineNumbers(),
      highlightActiveLine(),
      drawSelection(),
      langExt,
      syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
      EditorState.readOnly.of(true),
      EditorView.editable.of(false),
      EditorView.theme({
        '&': { height: '100%', fontSize: '13px' },
        '.cm-scroller': { overflow: 'auto', fontFamily: 'var(--mono)', lineHeight: '1.7' },
        '.cm-gutters': { background: 'var(--bg2)', borderRight: '1px solid var(--bd)', color: 'var(--tx4)' },
        '.cm-content': { padding: '8px 0' },
      }),
    ],
  });
  viewContainer.appendChild(compiledView.dom);
  compiledView.dom.addEventListener('click', handleCompiledClick);
}

function handleCompiledClick(e) {
  if (!compiledView) return;
  const pos = compiledView.posAtCoords({ x: e.clientX, y: e.clientY });
  if (pos == null) return;
  const line = compiledView.state.doc.lineAt(pos).number;

  // Highlight the clicked compiled line
  const lineObj = compiledView.state.doc.line(line);
  const domPos = compiledView.domAtPos(lineObj.from);
  let el = domPos?.node;
  if (!(el instanceof Element)) el = el?.parentElement;
  while (el && !el.classList.contains('cm-line')) el = el.parentElement;

  const clearLine = sourceMapData?.reverse?.[line - 1];
  if (clearLine != null) {
    // Mapped line — jump to source
    jumpToLine(clearLine);
    if (el) { el.classList.add('cm-source-map-active'); setTimeout(() => el.classList.remove('cm-source-map-active'), 1500); }
  } else {
    // Boilerplate — no Clear source wrote this line
    if (el) { el.classList.add('cm-source-map-active'); setTimeout(() => el.classList.remove('cm-source-map-active'), 1500); }
    showToast('Compiler boilerplate — no Clear source line');
  }
}

function prettyJson(str) {
  // Try to detect and pretty-print JSON in terminal output
  const trimmed = str.trim();
  if ((trimmed.startsWith('{') || trimmed.startsWith('[')) && (trimmed.endsWith('}') || trimmed.endsWith(']'))) {
    try {
      const obj = JSON.parse(trimmed);
      const formatted = JSON.stringify(obj, null, 2);
      // Syntax-highlight the JSON
      const highlighted = formatted
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
        .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
        .replace(/: (null)/g, ': <span class="json-null">$1</span>');
      return '<span class="term-json">' + highlighted + '</span>';
    } catch {}
  }
  return null;
}

function appendTerminalText(text, cls) {

  appendTerminal('<span class="' + (cls || 'term-out') + '">' + escHtml(text) + '</span>\n');

// ==========================================================================
// SOURCE PARSER — extract tables, endpoints, agents from Clear source
// ==========================================================================
function parseSourceInfo(source) {
  const lines = (source || editor.state.doc.toString()).split('\n');
  const tables = [], endpoints = [], agents = [];
  const tableColumns = {}; // tableName → ['col1', 'col2', ...]
  let hasAuth = false;
  let currentTable = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const tbl = line.match(/^create\s+(?:a\s+)?(\w+)\s+table/i);
    if (tbl) {
      currentTable = tbl[1];
      tables.push(currentTable);
      tableColumns[currentTable] = [];
      continue;
    }
    // Parse indented fields under a table definition
    if (currentTable && /^\s+\S/.test(line) && !/^create\s/i.test(line.trim()) && !/^when\s/i.test(line.trim()) && !/^page\s/i.test(line.trim()) && !/^agent\s/i.test(line.trim()) && !/^build\s/i.test(line.trim())) {
      const fieldName = line.trim().split(/[\s,]+/)[0].replace(/,$/,'');
      if (fieldName && !fieldName.startsWith('#') && !fieldName.startsWith('//')) {
        tableColumns[currentTable].push(fieldName);
      }
      continue;
    }
    // Non-indented line = end of table block
    if (currentTable && /^\S/.test(line)) currentTable = null;

    const ep = line.match(/^when\s+user\s+calls\s+(GET|POST|PUT|DELETE)\s+(\S+)/i);
    if (ep) {
      const hasBody = /sending\s+\w+/.test(line);
      const hasId = ep[2].includes(':id');
      endpoints.push({ method: ep[1].toUpperCase(), path: ep[2], hasBody, hasId });
    }
    const ag = line.match(/^agent\s+'([^']+)'/i);
    if (ag) agents.push(ag[1]);
    if (/requires\s+auth/i.test(line)) hasAuth = true;
  }
  return { tables, endpoints, agents, hasAuth, tableColumns };
}

function getTableNames() {
  return parseSourceInfo().tables;
}

window.toggleAddRow = function(tableName) {
  const el = document.getElementById('add-row-' + tableName);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
};

window.submitAddRow = async function(tableName) {
  const { tableColumns } = parseSourceInfo();
  const cols = (tableColumns[tableName] || []).filter(c => c !== 'id' && c !== '_id');
  const body = {};
  for (const c of cols) {
    const input = document.getElementById('add-' + tableName + '-' + c);
    if (input && input.value.trim()) {
      // Try to parse as number if it looks numeric
      const val = input.value.trim();
      body[c] = /^\d+\.?\d*$/.test(val) ? parseFloat(val) : val;
    }
  }
  if (Object.keys(body).length === 0) return;
  await fetch('/api/fetch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: 'POST', path: '/api/' + tableName.toLowerCase(), body }),
  });
  showData();
};

async function fetchTableData(tableName) {
  const r = await fetch('/api/fetch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: 'GET', path: '/api/' + tableName.toLowerCase() }),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return Array.isArray(d.data) ? d.data : [];
}

window.deleteDataRow = async function(tableName, id) {
  await fetch('/api/fetch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: 'DELETE', path: '/api/' + tableName.toLowerCase() + '/' + id }),
  });
  showData();
};

window.refreshTable = function(tableName) {
  showData();
};

async function showData() {
  const el = document.getElementById('preview-content');

  // Check if app is running
  let status;
  try { status = await (await fetch('/api/app-status')).json(); } catch { status = { running: false }; }

  if (!status.running) {
    el.innerHTML = '<div class="data-no-app"><div class="icon">⚡</div><div>Run your app first to see live data</div></div>';
    return;
  }

  const tables = getTableNames();
  if (tables.length === 0) {
    el.innerHTML = '<div class="data-no-app"><div class="icon">🗄️</div><div>No tables defined in this app</div></div>';
    return;
  }

  el.innerHTML = '<div id="data-panel"><div style="color:var(--tx3);font-size:12px">Loading...</div></div>';
  const panel = document.getElementById('data-panel');
  panel.innerHTML = '';

  const { tableColumns } = parseSourceInfo();

  for (const tableName of tables) {
    const block = document.createElement('div');
    block.className = 'data-table-block';

    let rows = [];
    let err = null;
    try { rows = await fetchTableData(tableName); }
    catch (e) { err = e.message; }

    // Use columns from source schema first, fall back to data keys
    const schemaCols = tableColumns[tableName] || [];
    const dataCols = rows.length > 0 ? Object.keys(rows[0]).filter(k => k !== '__v') : [];
    // Merge: schema cols + any extra cols from data (like 'id') that aren't in schema
    const cols = [...new Set(['id', ...schemaCols, ...dataCols])];
    const hasId = cols.includes('id') || cols.includes('_id');
    const editableCols = cols.filter(c => c !== 'id' && c !== '_id');

    block.innerHTML = `
      <div class="data-table-header">
        <span class="data-table-name">${escHtml(tableName)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="data-table-count">${rows.length} row${rows.length !== 1 ? 's' : ''} · ${cols.length} col${cols.length !== 1 ? 's' : ''}</span>
          <button class="data-refresh-btn" onclick="toggleAddRow('${escHtml(tableName)}')" title="Add a new row">+ Add Row</button>
          <button class="data-refresh-btn" onclick="refreshTable('${escHtml(tableName)}')">↻ Refresh</button>
        </span>
      </div>
      <div id="add-row-${escHtml(tableName)}" style="display:none;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:end;">
          ${editableCols.map(c => `<div style="display:flex;flex-direction:column;gap:2px;">
            <label style="font-size:10px;color:var(--tx3)">${escHtml(c)}</label>
            <input type="text" id="add-${escHtml(tableName)}-${escHtml(c)}" style="font-size:12px;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--bg);color:var(--tx);width:120px;" placeholder="${escHtml(c)}">
          </div>`).join('')}
          <button class="data-refresh-btn" onclick="submitAddRow('${escHtml(tableName)}')" style="background:var(--accent);color:white;border:none;padding:4px 12px;">Save</button>
        </div>
      </div>
      ${err ? `<div class="data-empty" style="color:var(--red)">${escHtml(err)}</div>` :
        `<table class="data-grid">
          <thead><tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join('')}<th></th></tr></thead>
          <tbody>${rows.length === 0
            ? `<tr><td colspan="${cols.length + 1}" style="text-align:center;color:var(--tx3);padding:12px;">No records yet — click + Add Row</td></tr>`
            : rows.map(row => {
            const rowId = row.id || row._id || '';
            return `<tr>${cols.map(c => `<td title="${escHtml(String(row[c] ?? ''))}">${escHtml(String(row[c] ?? ''))}</td>`).join('')}
              <td>${rowId ? `<button class="data-del-btn" onclick="deleteDataRow('${escHtml(tableName)}','${escHtml(String(rowId))}')" title="Delete">✕</button>` : ''}</td></tr>`;
          }).join('')}</tbody>
        </table>`
      }`;
    panel.appendChild(block);
  }
}

// ==========================================================================
// API TAB — route tester
// ==========================================================================
function showApiTab() {
  const el = document.getElementById('preview-content');
  const { endpoints } = parseSourceInfo();

  if (!endpoints.length) {
    el.innerHTML = '<div class="data-no-app"><div class="icon">⚡</div><div>No endpoints defined in this app</div></div>';
    return;
  }

  el.innerHTML = '<div id="api-panel"></div>';
  const panel = document.getElementById('api-panel');

  endpoints.forEach((ep, idx) => {
    const needsBody = ep.method === 'POST' || ep.method === 'PUT';
    const needsId = ep.hasId;
    const defaultBody = needsBody ? JSON.stringify(
      ep.method === 'POST' ? { name: 'Example', value: 'test' } : { name: 'Updated' }, null, 2
    ) : '';

    const card = document.createElement('div');
    card.className = 'ep-card';
    card.innerHTML = `
      <div class="ep-header" onclick="toggleEpBody(${idx})">
        <span class="ep-method ep-${ep.method.toLowerCase()}">${ep.method}</span>
        <span class="ep-path">${escHtml(ep.path)}</span>
        <span style="font-size:11px;color:var(--tx3)">${needsBody ? '+ body' : ''}${needsId ? ' :id' : ''}</span>
      </div>
      <div class="ep-body" id="ep-body-${idx}" style="display:none">
        ${needsId ? `<div><label style="font-size:11px;color:var(--tx3);margin-bottom:3px;display:block">ID</label><input type="text" id="ep-id-${idx}" placeholder="record id"></div>` : ''}
        ${needsBody ? `<div><label style="font-size:11px;color:var(--tx3);margin-bottom:3px;display:block">Body (JSON)</label><textarea id="ep-body-json-${idx}" rows="4">${escHtml(defaultBody)}</textarea></div>` : ''}
        <div style="display:flex;align-items:center;gap:8px">
          <button class="ep-send-btn" onclick="sendApiRequest(${idx}, '${ep.method}', '${escHtml(ep.path)}')">Send</button>
          <span id="ep-status-${idx}" style="font-size:11px"></span>
        </div>
        <div id="ep-response-${idx}" style="display:none" class="ep-response"></div>
      </div>`;
    panel.appendChild(card);
  });
}

window.toggleEpBody = function(idx) {
  const body = document.getElementById(`ep-body-${idx}`);
  if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
};

window.sendApiRequest = async function(idx, method, pathTemplate) {
  const statusEl = document.getElementById(`ep-status-${idx}`);
  const respEl = document.getElementById(`ep-response-${idx}`);
  statusEl.textContent = 'Sending...';
  statusEl.className = '';
  respEl.style.display = 'none';

  // Build path (replace :id if needed)
  let path = pathTemplate;
  const idEl = document.getElementById(`ep-id-${idx}`);
  if (idEl) path = path.replace(':id', encodeURIComponent(idEl.value || '1'));

  // Build body
  let body = undefined;
  const bodyEl = document.getElementById(`ep-body-json-${idx}`);
  if (bodyEl && bodyEl.value.trim()) {
    try { body = JSON.parse(bodyEl.value); }
    catch { statusEl.textContent = 'Invalid JSON body'; statusEl.className = 'ep-status-err'; return; }
  }

  try {
    const r = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method, path, body }),
    });
    const d = await r.json();
    if (d.error) {
      statusEl.textContent = d.error;
      statusEl.className = 'ep-status-err';
    } else {
      statusEl.innerHTML = `<span class="${d.status < 300 ? 'ep-status-ok' : 'ep-status-err'}">${d.status}</span>`;
      respEl.textContent = typeof d.data === 'string' ? d.data : JSON.stringify(d.data, null, 2);
      respEl.style.display = '';
    }
  } catch (err) {
    statusEl.textContent = 'No app running — click Run first';
    statusEl.className = 'ep-status-err';
  }
};

window.doRun = async function() {
  // Determine what backend code we have — full-stack puts it in serverJS,
  // backend-only (no HTML) puts it in javascript
  const backendCode = lastCompiled?.serverJS || (!lastCompiled?.html && lastCompiled?.javascript) || null;
  // Web-only app: just show the rendered output, no server needed
  if (lastCompiled?.html && !backendCode) {
    showTab('output');
    return;
  }
  if (!lastCompiled || !backendCode) {
    appendTerminal('<span class="term-err">Compile first.</span>\n');
    showTab('terminal');
    return;
  }
  setStatus('compiling', 'Starting...');
  appendTerminal('<span class="term-cmd">$ node server.js</span>\n');
  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ serverJS: backendCode, html: lastCompiled.html, css: lastCompiled.css }),
    });
    const data = await r.json();
    if (data.error) {
      appendTerminal('<span class="term-err">' + escHtml(data.error) + '</span>\n');
      setStatus('err', 'Run failed');
      showTab('terminal');
    } else {
      appendTerminal('<span class="term-status">Server running on port ' + data.port + '</span>\n');
      if (data.logs) data.logs.forEach(l => appendTerminalText(l));
      setStatus('ok', 'Running :' + data.port);
      runningPort = data.port;
      // Show output — but don't switch tabs if compile animation is playing
      if (!compileAnimRunning) {
        showTab('compiled');
      }
    }
  } catch (err) {
    appendTerminal('<span class="term-err">' + escHtml(err.message) + '</span>\n');
    setStatus('err', 'Run failed');
    showTab('terminal');
  }
};

window.doStop = async function() {
  await fetch('/api/stop', { method: 'POST' });
  appendTerminal('<span class="term-status">Server stopped.</span>\n');
  setStatus('ok', 'Stopped');
  runningPort = null;
  if (activeTab === 'output') showOutput();
};

function showErrors(errors, warnings) {
  const el = document.getElementById('errors');
  if (!errors.length && (!warnings || !warnings.length)) { el.innerHTML = ''; return; }
  let html = '';
  errors.forEach(e => {
    html += `<div class="error-line" onclick="jumpToLine(${e.line || 1})">Line ${e.line || '?'}: ${escHtml(e.message)}</div>`;
  });
  (warnings || []).forEach(w => {
    const msg = typeof w === 'string' ? w : w.message || '';
    const line = typeof w === 'object' ? (w.line || 0) : 0;
    html += `<div class="warning-line" style="cursor:pointer" onclick="jumpToLine(${line || 1})">${escHtml(msg)}</div>`;
  });
  el.innerHTML = html;
}

window.jumpToLine = function(line) {
  const lineObj = editor.state.doc.line(Math.min(line, editor.state.doc.lines));
  editor.dispatch({
    selection: { anchor: lineObj.from },
    effects: EditorView.scrollIntoView(lineObj.from, { y: 'start', yMargin: 8 })
  });
  editor.focus();
  // Flash highlight the line using a decoration
  const lineEl = editor.domAtPos(lineObj.from)?.node;
  // Walk up to find the cm-line div
  let el = lineEl instanceof Element ? lineEl : lineEl?.parentElement;
  while (el && !el.classList.contains('cm-line')) el = el.parentElement;
  if (el) {
    el.classList.remove('cm-jump-line');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('cm-jump-line');
    setTimeout(() => el.classList.remove('cm-jump-line'), 950);
  }
};

// ==========================================================================
// MARKDOWN RENDERER
// ==========================================================================
function markdownToHtml(text) {
  // Escape helper for non-code content
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Split out fenced code blocks first, then bare SVG blocks
  const parts = [];
  // Phase 1: extract fenced code blocks
  const codeRe = /```(\w*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = codeRe.exec(text)) !== null) {
    if (m.index > last) parts.push({ type: 'text', s: text.slice(last, m.index) });
    parts.push({ type: 'code', lang: m[1], s: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type: 'text', s: text.slice(last) });
  // Phase 2: extract bare <svg>...</svg> from text parts (Meph often emits SVG without fences)
  const svgRe = /<svg[\s\S]*?<\/svg>/gi;
  const expanded = [];
  for (const p of parts) {
    if (p.type !== 'text') { expanded.push(p); continue; }
    let svgLast = 0, svgM;
    svgRe.lastIndex = 0;
    let found = false;
    while ((svgM = svgRe.exec(p.s)) !== null) {
      found = true;
      if (svgM.index > svgLast) expanded.push({ type: 'text', s: p.s.slice(svgLast, svgM.index) });
      expanded.push({ type: 'code', lang: 'svg', s: svgM[0] });
      svgLast = svgM.index + svgM[0].length;
    }
    if (found && svgLast < p.s.length) expanded.push({ type: 'text', s: p.s.slice(svgLast) });
    if (!found) expanded.push(p);
  }
  parts.length = 0;
  parts.push(...expanded);
  // Phase 3: suppress incomplete SVG during streaming — show placeholder instead of raw tags
  for (let i = 0; i < parts.length; i++) {
    if (parts[i].type !== 'text') continue;
    const s = parts[i].s;
    const svgStart = s.indexOf('<svg');
    if (svgStart !== -1 && s.indexOf('</svg>', svgStart) === -1) {
      // Incomplete SVG — cut it off and show placeholder
      const before = s.slice(0, svgStart);
      parts[i] = { type: 'text', s: before + '\n*Rendering diagram...*\n' };
    }
    // Also suppress incomplete fenced svg blocks: ```svg\n<svg... (no closing ```)
    const fencedSvg = s.indexOf('```svg');
    if (fencedSvg !== -1 && s.indexOf('```', fencedSvg + 6) === -1) {
      const before = s.slice(0, fencedSvg);
      parts[i] = { type: 'text', s: before + '\n*Rendering diagram...*\n' };
    }
  }

  function renderInline(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  function renderText(s) {
    const lines = s.split('\n');
    let out = '';
    let inList = false;  // 'ul' or 'ol' or false
    let inTable = false;
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      // Table detection: line starts with |
      if (/^\|(.+)\|/.test(line.trim())) {
        if (inList) { out += inList === 'ol' ? '</ol>' : '</ul>'; inList = false; }
        if (!inTable) {
          out += '<table>';
          inTable = true;
          // First row = header
          const cells = line.trim().split('|').filter(c => c.trim() !== '');
          out += '<thead><tr>' + cells.map(c => `<th>${renderInline(c.trim())}</th>`).join('') + '</tr></thead><tbody>';
          // Skip separator row if next line is |---|---|
          if (i + 1 < lines.length && /^\|[\s\-:|]+\|/.test(lines[i + 1].trim())) i++;
          i++;
          continue;
        } else {
          const cells = line.trim().split('|').filter(c => c.trim() !== '');
          out += '<tr>' + cells.map(c => `<td>${renderInline(c.trim())}</td>`).join('') + '</tr>';
          i++;
          continue;
        }
      } else if (inTable) {
        out += '</tbody></table>';
        inTable = false;
      }

      if (/^#{1,3} (.+)/.test(line)) {
        if (inList) { out += inList === 'ol' ? '</ol>' : '</ul>'; inList = false; }
        const lvl = line.match(/^(#+)/)[1].length;
        out += `<h${lvl + 2} style="margin:.5em 0 .2em;font-size:${14 - lvl}px;font-weight:600">${renderInline(line.replace(/^#+\s+/, ''))}</h${lvl + 2}>`;
      } else if (/^[-*] (.+)/.test(line)) {
        if (inList !== 'ul') { if (inList) out += '</ol>'; out += '<ul style="margin:.3em 0 .3em 1.2em;padding:0">'; inList = 'ul'; }
        out += `<li>${renderInline(line.replace(/^[-*] /, ''))}</li>`;
      } else if (/^\d+\.\s+(.+)/.test(line)) {
        if (inList !== 'ol') { if (inList) out += '</ul>'; out += '<ol style="margin:.3em 0 .3em 1.2em;padding:0">'; inList = 'ol'; }
        out += `<li>${renderInline(line.replace(/^\d+\.\s+/, ''))}</li>`;
      } else if (line.trim() === '') {
        if (inList) { out += inList === 'ol' ? '</ol>' : '</ul>'; inList = false; }
        out += '<br>';
      } else {
        if (inList) { out += inList === 'ol' ? '</ol>' : '</ul>'; inList = false; }
        out += `<span>${renderInline(line)}</span><br>`;
      }
      i++;
    }
    if (inList) out += inList === 'ol' ? '</ol>' : '</ul>';
    if (inTable) out += '</tbody></table>';
    return out;
  }

  return parts.map(p => {
    if (p.type === 'code') {
      const lang = p.lang || '';
      // SVG: render as actual inline SVG diagram
      if (lang === 'svg' || (lang === '' && p.s.trim().startsWith('<svg'))) {
        // Sanitize: strip scripts and event handlers
        const sanitized = p.s
          .replace(/<script[\s\S]*?<\/script>/gi, '')
          .replace(/\bon\w+\s*=\s*["'][^"']*["']/gi, '')
          .replace(/javascript:/gi, '');
        return `<div class="svg-diagram" onclick="expandSvg(this)">${sanitized}</div>`;
      }
      // HTML: render preview + source
      if (lang === 'html' && p.s.includes('<')) {
        const escaped = esc(p.s);
        return `<div class="code-block"><div class="code-header"><span>${lang}</span><div class="code-btns"><button class="code-btn" onclick="copyCode(this)">Copy</button><button class="code-btn" onclick="toggleHtmlPreview(this)">Preview</button></div></div><pre>${escaped}</pre><div class="svg-diagram" style="display:none">${p.s}</div></div>`;
      }
      // Code: show language label, copy button, Replace+Insert for clear code
      const escaped = esc(p.s);
      const showEditor = lang === 'clear' || lang === '' ;
      const editorBtns = showEditor ? `<button class="code-btn" onclick="applyCode(this)">Replace</button><button class="code-btn" onclick="insertCode(this)">Insert</button>` : '';
      const label = lang || 'code';
      return `<div class="code-block"><div class="code-header"><span>${esc(label)}</span><div class="code-btns"><button class="code-btn" onclick="copyCode(this)">Copy</button>${editorBtns}</div></div><pre>${escaped}</pre></div>`;
    }
    return renderText(p.s);
  }).join('');
}

function restoreChatOrWelcome() {
  const saved = localStorage.getItem('clear_chat_messages');
  if (saved) {
    try {
      chatMessages = JSON.parse(saved).map(m => {
        if (m.interrupted) {
          // Mark interrupted messages so user sees what was in progress
          m.content = (m.content || '') + (m.content ? '\n\n' : '') + '*— interrupted by connection error —*';
          delete m.interrupted;
        }
        delete m.streaming;
        return m;
      });
      renderChat(true);
      return;
    } catch (_) {}
  }
  addChatMsg('assistant', 'Ready! Ask me to build something. I can write Clear code, compile it, run it, and test the endpoints.');
}

function updateContextMeter(percent, used, max) {
  const meter = document.getElementById('context-meter');
  const bar = document.getElementById('context-bar');
  const label = document.getElementById('context-label');
  if (!meter || !bar || !label) return;
  meter.style.display = 'flex';
  bar.style.width = percent + '%';
  bar.style.background = percent > 80 ? 'var(--red)' : percent > 50 ? 'var(--warning, orange)' : 'var(--accent)';
  const usedK = Math.round(used / 1000);
  const maxK = Math.round(max / 1000);
  label.textContent = `${usedK}k / ${maxK}k tokens (${percent}%)`;
}

function saveChatState() {
  try {
    const toSave = chatMessages
      .map(({ role, content, toolSteps, timeline, streaming }) => ({
        role, content,

        ...(streaming ? { interrupted: true } : {}),

  } catch (_) {}
}

function addChatMsg(role, content, toolSteps) {
  chatMessages.push({ role, content, toolSteps: toolSteps || [] });
  renderChat();
  saveChatState();
